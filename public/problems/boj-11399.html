<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그리디: ATM - 백준 11399</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "N = int(input())",
      "waiting = list(map(int, input().split()))",
      "",
      "# 대기 시간이 짧은 사람부터 처리하면 전체 대기 시간 최소",
      "waiting.sort()",
      "",
      "answer = 0",
      "",
      "# 각 사람은 자기 앞 사람들의 시간 + 본인 시간만큼 대기",
      "for i in range(N):",
      "    answer += waiting[i] * (N - i)",
      "",
      "print(answer)"
    ];

    const INITIAL_WAITING = [3, 1, 4, 3, 2];

    const generateSimulationSteps = (initial) => {
      const steps = [];
      const waiting = [...initial];
      const N = waiting.length;

      steps.push({
        codeLine: 1,
        desc: `${N}명의 대기 시간: [${waiting.join(', ')}]`,
        bars: waiting.map((v, i) => ({ value: v, label: `P${i+1}`, state: 'unsorted' })),
        answer: 0,
        currentI: null,
        currentCalc: null
      });

      waiting.sort((a, b) => a - b);
      steps.push({
        codeLine: 4,
        desc: `대기 시간 오름차순 정렬: [${waiting.join(', ')}]. 짧은 시간부터 처리하면 전체 대기 시간이 최소가 됩니다.`,
        bars: waiting.map((v, i) => ({ value: v, label: `${v}분`, state: 'sorted' })),
        answer: 0,
        currentI: null,
        currentCalc: null
      });

      let answer = 0;
      for (let i = 0; i < N; i++) {
        const contribution = waiting[i] * (N - i);
        answer += contribution;

        steps.push({
          codeLine: 10,
          desc: `${i+1}번째 사람(${waiting[i]}분): 이 사람 포함 뒤에 ${N - i}명이 기다림. 기여 = ${waiting[i]} × ${N - i} = ${contribution}. 누적 합 = ${answer}`,
          bars: waiting.map((v, j) => ({
            value: v,
            label: `${v}분`,
            state: j < i ? 'done' : j === i ? 'current' : 'waiting'
          })),
          answer: answer,
          currentI: i,
          currentCalc: contribution
        });
      }

      steps.push({
        codeLine: 12,
        desc: `모든 사람 처리 완료. 최소 총 대기 시간 = ${answer}분`,
        bars: waiting.map((v) => ({ value: v, label: `${v}분`, state: 'done' })),
        answer: answer,
        currentI: null,
        currentCalc: null
      });

      return steps;
    };

    const STEPS = generateSimulationSteps(INITIAL_WAITING);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\.)/g);
      const keywords = new Set(['for', 'in', 'import']);
      const builtins = new Set(['int', 'input', 'range', 'list', 'map', 'print']);
      const methods = new Set(['split', 'sort']);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (methods.has(token)) return <span key={i} className="text-yellow-200">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!=', '*'].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(prev => prev + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1200);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current && stepData.codeLine !== null) {
          const activeEl = codeViewerRef.current.querySelector('[data-active="true"]');
          if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [currentStepIdx]);

      const maxVal = Math.max(...stepData.bars.map(b => b.value));

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">그리디: ATM 최소 대기 시간</h1>
              <p className="text-slate-600">
                ATM 앞에 N명이 줄을 서 있을 때, <b>인출 시간이 짧은 사람부터</b> 처리하면 모든 사람의 대기 시간 합이 최소가 됩니다.
                i번째 사람의 인출 시간은 뒤에 있는 (N-i)명 모두에게 영향을 주므로, 짧은 시간이 앞에 올수록 유리합니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700 flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg font-semibold text-slate-800">대기열 상태</h2>
                    <div className="flex space-x-3 text-xs text-slate-500">
                      <div className="flex items-center"><span className="w-3 h-3 bg-blue-500 rounded-sm mr-1"></span> 현재</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-emerald-500 rounded-sm mr-1"></span> 처리 완료</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-slate-200 rounded-sm mr-1"></span> 대기중</div>
                    </div>
                  </div>

                  <div className="flex items-end justify-center h-48 border-b-2 border-slate-300 pb-1 mb-6 space-x-3">
                    {stepData.bars.map((bar, idx) => {
                      const heightPct = Math.max(15, (bar.value / maxVal) * 100);
                      let barClass = "w-14 rounded-t-md flex flex-col justify-end items-center text-sm font-bold pb-2 ";
                      if (bar.state === 'current') barClass += "bg-blue-500 text-white shadow-lg scale-105 border-b-4 border-blue-700";
                      else if (bar.state === 'done') barClass += "bg-emerald-500 text-white border-b-4 border-emerald-700 opacity-80";
                      else if (bar.state === 'sorted') barClass += "bg-blue-200 text-blue-900 border-b-4 border-blue-300";
                      else barClass += "bg-slate-200 text-slate-500";

                      return (
                        <div key={idx} className="flex flex-col items-center">
                          <div className={barClass} style={{ height: `${heightPct}%`, transition: 'all 0.3s' }}>{bar.value}</div>
                          <div className="text-xs text-slate-400 mt-2 font-mono">{idx + 1}번째</div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 space-y-3">
                    {stepData.currentCalc !== null && (
                      <div className="flex justify-between text-sm">
                        <span className="text-slate-600">현재 기여 <code className="bg-slate-200 px-1 rounded">waiting[i] × (N-i)</code></span>
                        <span className="font-bold text-blue-600">{stepData.currentCalc}</span>
                      </div>
                    )}
                    <div className="flex justify-between items-center bg-slate-800 text-white p-3 rounded-md shadow-sm">
                      <span className="font-semibold text-sm">총 대기 시간 <code className="bg-slate-700 px-1 text-xs rounded">answer</code></span>
                      <span className="text-2xl font-bold text-emerald-400">{stepData.answer}</span>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 일시정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 재생</>
                      )}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'}
                          className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
