<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그래프: 바이러스 - 백준 2606</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "import sys",
      "from collections import deque",
      "def bfs(start):",
      "    queue = deque([start])",
      "    visited[start] = 1",
      "    while queue:",
      "        v = queue.popleft()",
      "        for i in graph[v]:",
      "            if visited[i] == 0:",
      "                queue.append(i)",
      "                visited[i] = 1",
      "n = int(input())",
      "v = int(input())",
      "graph = [[] for _ in range(n + 1)]",
      "visited = [0] * (n + 1)",
      "for _ in range(v):",
      "    a, b = map(int, input().split())",
      "    graph[a].append(b)",
      "    graph[b].append(a)",
      "bfs(1)",
      "print(sum(visited) - 1)"
    ];

    const generateSimulationSteps = () => {
      const steps = [];
      const N = 7;
      const edges = [[1, 2], [2, 3], [1, 5], [5, 2], [5, 6], [4, 7]];
      const graph = Array.from({length: N + 1}, () => []);
      for (const [a, b] of edges) {
        graph[a].push(b);
        graph[b].push(a);
      }
      
      const visited = new Array(N + 1).fill(0);
      const queue = [];

      steps.push({
        codeLine: 19,
        desc: `n=${N}, 간선=${edges.length}. 1번 컴퓨터에서 웜 바이러스가 시작됩니다. bfs(1) 호출.`,
        visited: [...visited],
        queue: [...queue],
        current: null,
      });

      queue.push(1);
      visited[1] = 1;

      steps.push({
        codeLine: 4,
        desc: `BFS 시작: 큐에 [1]을 삽입하고, 1번 컴퓨터를 감염(visited=1) 처리합니다.`,
        visited: [...visited],
        queue: [...queue],
        current: 1,
      });

      while (queue.length > 0) {
        steps.push({
          codeLine: 5,
          desc: `큐가 비어있지 않으므로 탐색을 진행합니다. 현재 큐: [${queue.join(', ')}]`,
          visited: [...visited],
          queue: [...queue],
          current: queue[0],
        });

        const v = queue.shift();
        
        steps.push({
          codeLine: 6,
          desc: `큐에서 맨 앞의 ${v}을(를) 꺼냅니다.`,
          visited: [...visited],
          queue: [...queue],
          current: v,
        });

        steps.push({
          codeLine: 7,
          desc: `컴퓨터 ${v}와 연결된 컴퓨터들 [${graph[v].join(', ')}]을 순차적으로 확인합니다.`,
          visited: [...visited],
          queue: [...queue],
          current: v,
        });

        for (const i of graph[v]) {
          steps.push({
            codeLine: 8,
            desc: `컴퓨터 ${i}이(가) 이미 감염(visited)되었는지 확인합니다...`,
            visited: [...visited],
            queue: [...queue],
            current: v,
            checking: i,
          });

          if (visited[i] === 0) {
            queue.push(i);
            visited[i] = 1;
            steps.push({
              codeLine: 10,
              desc: `컴퓨터 ${i}은(는) 감염되지 않았으므로 큐에 추가하고 감염 처리합니다!`,
              visited: [...visited],
              queue: [...queue],
              current: v,
              checking: i,
            });
          } else {
            steps.push({
              codeLine: 8,
              desc: `컴퓨터 ${i}은(는) 이미 감염되었습니다. 넘어갑니다.`,
              visited: [...visited],
              queue: [...queue],
              current: v,
              checking: i,
            });
          }
        }
      }

      steps.push({
        codeLine: 20,
        desc: `큐가 비어 탐색이 종료되었습니다. 1번 컴퓨터를 제외한 감염된 컴퓨터 수는 ${visited.reduce((a,b)=>a+b,0) - 1}대 입니다.`,
        visited: [...visited],
        queue: [...queue],
        current: null,
      });

      return steps;
    };

    const STEPS = generateSimulationSteps();

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      const keywords = new Set(['for', 'in', 'if', 'while', 'def', 'import', 'from']);
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*)/g);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!=', '*'].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      // 물리 형태의 그래프 노드 좌표 배치
      const nodePos = {
        1: { x: 50, y: 150 },
        2: { x: 150, y: 80 },
        3: { x: 250, y: 80 },
        5: { x: 150, y: 220 },
        6: { x: 250, y: 220 },
        4: { x: 350, y: 150 },
        7: { x: 450, y: 150 },
      };

      const edges = [[1, 2], [2, 3], [1, 5], [5, 2], [5, 6], [4, 7]];

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(p => p + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1200);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const el = codeViewerRef.current.querySelector('[data-active="true"]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [currentStepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">그래프 탐색: 웜 바이러스</h1>
              <p className="text-slate-600">
                1번 컴퓨터부터 시작하여 네트워크를 타고 전파되는 바이러스 감염 경로를 BFS를 이용해 시각화합니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 relative flex flex-col justify-between">
                  <div>
                    <h2 className="text-lg font-semibold text-slate-800 mb-2 font-mono">가상 네트워크 그래프</h2>
                    <div className="flex justify-center my-6">
                      <svg width="500" height="300" className="drop-shadow bg-slate-50 border border-slate-200 rounded-lg" viewBox="0 0 500 300">
                        {edges.map(([u, v], i) => (
                          <line
                            key={i}
                            x1={nodePos[u].x}
                            y1={nodePos[u].y}
                            x2={nodePos[v].x}
                            y2={nodePos[v].y}
                            stroke={stepData.visited[u] && stepData.visited[v] ? "#fca5a5" : "#cbd5e1"}
                            strokeWidth={stepData.visited[u] && stepData.visited[v] ? 4 : 2}
                          />
                        ))}
                        {[1, 2, 3, 4, 5, 6, 7].map(n => {
                          const pos = nodePos[n];
                          const isVisited = stepData.visited[n] === 1;
                          const isCurrent = stepData.current === n;
                          const isChecking = stepData.checking === n;
                          
                          let fill = isVisited ? "#ef4444" : "#f1f5f9";
                          let stroke = isVisited ? "#b91c1c" : "#94a3b8";
                          
                          if (isCurrent) {
                            fill = "#3b82f6";
                            stroke = "#1d4ed8";
                          } else if (isChecking && !isVisited) {
                            fill = "#fbd38d";
                            stroke = "#f6ad55";
                          } else if (isChecking && isVisited) {
                            fill = "#991b1b";
                            stroke = "#7f1d1d";
                          }

                          return (
                            <g key={n}>
                              <circle cx={pos.x} cy={pos.y} r={20} fill={fill} stroke={stroke} strokeWidth="3" className="transition-colors duration-300" />
                              <text x={pos.x} y={pos.y + 1} textAnchor="middle" dominantBaseline="middle" fill={isVisited || isCurrent ? "white" : "#475569"} fontSize="14" fontWeight="bold">
                                {n}
                              </text>
                              {n === 1 && <text x={pos.x} y={pos.y - 30} textAnchor="middle" fill="#ef4444" fontSize="11" fontWeight="bold">Host</text>}
                            </g>
                          )
                        })}
                      </svg>
                    </div>
                  </div>
                  
                  <div className="bg-slate-100 p-3 rounded-lg border border-slate-200">
                    <h3 className="text-xs font-bold text-slate-500 mb-1">Queue State</h3>
                    <div className="flex gap-2 min-h-[32px]">
                      {stepData.queue.length === 0 ? (
                         <div className="text-slate-400 text-sm italic py-1">Empty</div>
                      ) : (
                        stepData.queue.map((q, i) => (
                          <div key={i} className="bg-blue-500 text-white font-bold w-8 h-8 flex items-center justify-center rounded shadow-sm">
                            {q}
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden" style={{ minHeight: '500px' }}>
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded gap-2 ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
