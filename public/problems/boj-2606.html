<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바이러스 시각화 - 백준 2606</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "N = int(input())",
      "M = int(input())",
      "adj = [[] for _ in range(N)]",
      "",
      "for _ in range(M):",
      "    a, b = list(map(int, input().split()))",
      "    adj[a-1].append(b-1)",
      "    adj[b-1].append(a-1)",
      "",
      "visit = [False] * N",
      "",
      "def dfs(node):",
      "    visit[node] = True",
      "    for n in adj[node]:",
      "        if not visit[n]:",
      "            dfs(n)",
      "",
      "dfs(0)",
      "cnt = sum(visit) - 1",
      "print(cnt)"
    ];

    // 7개 컴퓨터, 간선: 1-2, 2-3, 1-5, 5-2, 5-6, 4-7
    const N = 7;
    const EDGES = [[0,1],[1,2],[0,4],[4,1],[4,5],[3,6]];
    const adj = Array.from({length: N}, () => []);
    EDGES.forEach(([a,b]) => { adj[a].push(b); adj[b].push(a); });

    // 노드 위치 (원형 배치)
    const POS = [
      {x: 200, y: 60},  // 1
      {x: 120, y: 150}, // 2
      {x: 200, y: 240}, // 3
      {x: 350, y: 60},  // 4
      {x: 280, y: 150}, // 5
      {x: 350, y: 240}, // 6
      {x: 420, y: 60},  // 7
    ];

    const generateSteps = () => {
      const steps = [];
      const visit = new Array(N).fill(false);
      const stack = [];

      steps.push({ codeLine: 0, desc: `${N}개의 컴퓨터와 ${EDGES.length}개의 연결 정보가 주어집니다.`, visit: [...visit], current: null, stack: [] });
      steps.push({ codeLine: 9, desc: "방문 배열을 초기화합니다.", visit: [...visit], current: null, stack: [] });

      // DFS 시뮬레이션 (재귀 대신 스택으로)
      const dfsStack = [0];
      const order = [];

      steps.push({ codeLine: 17, desc: "1번 컴퓨터에서 DFS 탐색을 시작합니다.", visit: [...visit], current: 0, stack: [0] });

      while (dfsStack.length > 0) {
        const node = dfsStack.pop();
        if (visit[node]) continue;
        visit[node] = true;
        order.push(node);

        steps.push({ codeLine: 12, desc: `${node + 1}번 컴퓨터 방문! 감염됩니다. 🦠`, visit: [...visit], current: node, stack: [...dfsStack] });

        const neighbors = [...adj[node]].reverse();
        for (const n of neighbors) {
          if (!visit[n]) {
            steps.push({ codeLine: 14, desc: `${node + 1}번에서 ${n + 1}번으로 이동 가능합니다.`, visit: [...visit], current: node, checking: n, stack: [...dfsStack] });
            dfsStack.push(n);
          }
        }
      }

      const infected = visit.filter(v => v).length - 1;
      steps.push({ codeLine: 18, desc: `DFS 완료! 1번 컴퓨터를 통해 감염된 컴퓨터 수: ${infected}`, visit: [...visit], current: null, stack: [] });
      return steps;
    };

    const STEPS = generateSteps();

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|\*|<|>|\.)/g);
      const keywords = new Set(['import', 'from', 'for', 'in', 'if', 'not', 'def']);
      const builtins = new Set(['range', 'int', 'list', 'map', 'sum', 'print', 'input', 'True', 'False']);
      return <>{tokens.map((t, i) => {
        if (keywords.has(t)) return <span key={i} className="text-pink-400 font-semibold">{t}</span>;
        if (builtins.has(t)) return <span key={i} className="text-cyan-400">{t}</span>;
        if (!isNaN(t) && t.trim() !== '') return <span key={i} className="text-orange-300">{t}</span>;
        if (['=', '+', '-'].includes(t)) return <span key={i} className="text-pink-400">{t}</span>;
        return <span key={i} className="text-slate-200">{t}</span>;
      })}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(p => p + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 900);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const el = codeViewerRef.current.querySelector('[data-active="true"]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [currentStepIdx]);

      const infectedCount = stepData.visit.filter(v => v).length;

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">바이러스: DFS 감염 확산</h1>
              <p className="text-slate-600">
                1번 컴퓨터가 바이러스에 감염되었을 때, 네트워크를 통해 <b>DFS(깊이 우선 탐색)</b>로
                감염되는 컴퓨터 수를 구합니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="flex flex-col space-y-6">
                {/* 그래프 시각화 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-lg font-semibold text-slate-800">네트워크 그래프</h2>
                    <span className="text-sm font-mono">감염: <span className="text-red-600 font-bold">{infectedCount}</span> / {N}</span>
                  </div>
                  <svg viewBox="0 0 500 300" className="w-full" style={{ maxHeight: '300px' }}>
                    {/* 간선 */}
                    {EDGES.map(([a, b], i) => (
                      <line key={i} x1={POS[a].x} y1={POS[a].y} x2={POS[b].x} y2={POS[b].y}
                        stroke={stepData.visit[a] && stepData.visit[b] ? '#ef4444' : '#cbd5e1'} strokeWidth="2" />
                    ))}
                    {/* 노드 */}
                    {POS.map((pos, idx) => {
                      const isInfected = stepData.visit[idx];
                      const isCurrent = stepData.current === idx;
                      const isChecking = stepData.checking === idx;
                      return (
                        <g key={idx}>
                          <circle cx={pos.x} cy={pos.y} r={isCurrent ? 24 : 20}
                            fill={isInfected ? '#ef4444' : isChecking ? '#f97316' : '#e2e8f0'}
                            stroke={isCurrent ? '#991b1b' : isChecking ? '#c2410c' : '#94a3b8'} strokeWidth={isCurrent ? 3 : 1.5} />
                          <text x={pos.x} y={pos.y + 5} textAnchor="middle" fontSize="14" fontWeight="bold"
                            fill={isInfected ? 'white' : '#475569'}>{idx + 1}</text>
                          {isInfected && <text x={pos.x + 18} y={pos.y - 16} fontSize="16">🦠</text>}
                        </g>
                      );
                    })}
                  </svg>
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>
                      )}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'}
                          className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
