<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DP: 1로 만들기 - 백준 1463</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "N = int(input())",
      "dp = [0] * (N + 1)",
      "for i in range(2, N + 1):",
      "    dp[i] = dp[i - 1] + 1",
      "    if i % 2 == 0:",
      "        dp[i] = min(dp[i], dp[i // 2] + 1)",
      "    if i % 3 == 0:",
      "        dp[i] = min(dp[i], dp[i // 3] + 1)",
      "print(dp[N])"
    ];

    const generateSimulationSteps = () => {
      const steps = [];
      const N = 10;
      const dp = new Array(N + 1).fill(0);

      steps.push({
        codeLine: 1,
        desc: `N=${N}. dp 배열을 0으로 초기화합니다. dp[1]은 1을 1로 만드는 연산 횟수가 0이므로 0입니다.`,
        dp: [...dp],
        currentI: null,
      });

      for (let i = 2; i <= N; i++) {
        steps.push({
          codeLine: 2,
          desc: `현재 값 i = ${i}에 대해 최소 연산 횟수를 구합니다.`,
          dp: [...dp],
          currentI: i,
        });

        dp[i] = dp[i - 1] + 1;
        steps.push({
          codeLine: 3,
          desc: `(1) 먼저 값을 1 빼는 경우를 계산합니다. dp[${i}] = dp[${i-1}] + 1 = ${dp[i-1]} + 1 = ${dp[i]}`,
          dp: [...dp],
          currentI: i,
          checking: i - 1
        });

        if (i % 2 === 0) {
          steps.push({
            codeLine: 4,
            desc: `(2) ${i}는 2로 나누어 떨어집니다.`,
            dp: [...dp],
            currentI: i,
          });
          const candidate = dp[i / 2] + 1;
          if (candidate < dp[i]) {
            dp[i] = candidate;
            steps.push({
              codeLine: 5,
              desc: `2로 나누는 것이 더 유리합니다! dp[${i}] = dp[${i/2}] + 1 = ${candidate} (갱신)`,
              dp: [...dp],
              currentI: i,
              checking: i / 2
            });
          } else {
            steps.push({
              codeLine: 5,
              desc: `2로 나누는 경우(dp[${i/2}]+1 = ${candidate})가 현재 값(${dp[i]})보다 크거나 같으므로 갱신하지 않습니다.`,
              dp: [...dp],
              currentI: i,
              checking: i / 2
            });
          }
        }

        if (i % 3 === 0) {
          steps.push({
            codeLine: 6,
            desc: `(3) ${i}는 3으로 나누어 떨어집니다.`,
            dp: [...dp],
            currentI: i,
          });
          const candidate = dp[i / 3] + 1;
          if (candidate < dp[i]) {
            dp[i] = candidate;
            steps.push({
              codeLine: 7,
              desc: `3으로 나누는 것이 더 유리합니다! dp[${i}] = dp[${i/3}] + 1 = ${candidate} (갱신)`,
              dp: [...dp],
              currentI: i,
              checking: i / 3
            });
          } else {
            steps.push({
              codeLine: 7,
              desc: `3으로 나누는 경우(dp[${i/3}]+1 = ${candidate})가 현재 값(${dp[i]})보다 크거나 같으므로 갱신하지 않습니다.`,
              dp: [...dp],
              currentI: i,
              checking: i / 3
            });
          }
        }
      }

      steps.push({
        codeLine: 8,
        desc: `모든 계산이 완료되었습니다. dp[${N}] = ${dp[N]} 이 최솟값입니다!`,
        dp: [...dp],
        currentI: N,
      });

      return steps;
    };

    const STEPS = generateSimulationSteps();

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      const keywords = new Set(['for', 'in', 'if', 'min']);
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\/\/)/g);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!=', '//', '*'].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(p => p + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1200);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const el = codeViewerRef.current.querySelector('[data-active="true"]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [currentStepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">DP: 1로 만들기 시각화</h1>
              <p className="text-slate-600">
                1을 빼거나 2 또는 3으로 나누는 연산을 사용하여 N=10을 1로 만드는 최소 연산 횟수를 동적 계획법으로 구합니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1">
                  <h2 className="text-lg font-semibold text-slate-800 mb-4">DP 배열 (dp)</h2>
                  <div className="grid grid-cols-11 gap-1">
                    {stepData.dp.map((val, idx) => {
                      if (idx === 0) return null;
                      const isCurrent = stepData.currentI === idx;
                      const isChecking = stepData.checking === idx;
                      let bgClass = "bg-slate-100";
                      let borderClass = "border-slate-200";
                      let textClass = "text-slate-700";
                      
                      if (isCurrent) {
                        bgClass = "bg-blue-500";
                        borderClass = "border-blue-600";
                        textClass = "text-white font-bold";
                      } else if (isChecking) {
                        bgClass = "bg-orange-400";
                        borderClass = "border-orange-500";
                        textClass = "text-white font-bold";
                      } else if (val > 0) {
                        bgClass = "bg-emerald-100";
                        borderClass = "border-emerald-200";
                        textClass = "text-emerald-700 font-bold";
                      }
                      
                      return (
                        <div key={idx} className={`flex flex-col items-center justify-center border rounded py-2 ${bgClass} ${borderClass} transition-colors duration-300`}>
                          <span className="text-[0.65rem] text-slate-500 mb-1">i={idx}</span>
                          <span className={`${textClass}`}>{val}</span>
                        </div>
                      )
                    })}
                  </div>
                  
                  <div className="mt-6 flex flex-wrap gap-4 text-sm text-slate-600">
                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded bg-blue-500 border border-blue-600"></div>현재 계산 위치 (i)</div>
                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded bg-orange-400 border border-orange-500"></div>참조 위치</div>
                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded bg-emerald-100 border border-emerald-200"></div>계산 완료</div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden" style={{ minHeight: '500px' }}>
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
