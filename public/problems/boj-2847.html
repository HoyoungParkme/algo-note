<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그리디: 게임을 만든 동준이 - 백준 2847</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "N = int(input())",
      "level = [int(input()) for _ in range(N)]",
      "answer = 0",
      "",
      "# 뒤에서부터 순회하며 순증가 보장",
      "for i in range(N - 1, 0, -1):",
      "    # 현재 레벨이 이전 레벨 이하이면 조정",
      "    if level[i] <= level[i-1]:",
      "        diff = level[i-1] - (level[i] - 1)",
      "        answer += diff",
      "        level[i-1] = level[i] - 1",
      "",
      "print(answer)"
    ];

    const INITIAL_LEVELS = [5, 3, 7, 5, 5];

    const generateSimulationSteps = (initial) => {
      const steps = [];
      const level = [...initial];
      const N = level.length;
      let answer = 0;

      steps.push({
        codeLine: 1,
        desc: `${N}개 레벨의 초기 점수: [${level.join(', ')}]. 순증가하도록 만들어야 합니다.`,
        bars: level.map((v, i) => ({ value: v, original: initial[i], state: 'normal' })),
        answer: 0, currentI: null, diff: null
      });

      for (let i = N - 1; i > 0; i--) {
        steps.push({
          codeLine: 5,
          desc: `뒤에서부터 확인: level[${i}]=${level[i]}과 level[${i-1}]=${level[i-1]}을 비교합니다.`,
          bars: level.map((v, j) => ({ value: v, original: initial[j], state: j === i ? 'current' : j === i-1 ? 'checking' : 'normal' })),
          answer, currentI: i, diff: null
        });

        if (level[i] <= level[i-1]) {
          const diff = level[i-1] - (level[i] - 1);
          answer += diff;
          level[i-1] = level[i] - 1;

          steps.push({
            codeLine: 8,
            desc: `level[${i-1}]=${level[i-1]+diff}이 level[${i}]=${level[i]} 이상이므로, ${diff}만큼 감소시켜 ${level[i-1]}로 조정합니다. 누적 감소 = ${answer}`,
            bars: level.map((v, j) => ({ value: v, original: initial[j], state: j === i-1 ? 'adjusted' : j === i ? 'current' : 'normal' })),
            answer, currentI: i, diff
          });
        } else {
          steps.push({
            codeLine: 5,
            desc: `level[${i-1}]=${level[i-1]} < level[${i}]=${level[i]}. 이미 순증가이므로 조정 불필요.`,
            bars: level.map((v, j) => ({ value: v, original: initial[j], state: j === i ? 'ok' : j === i-1 ? 'ok' : 'normal' })),
            answer, currentI: i, diff: null
          });
        }
      }

      steps.push({
        codeLine: 12,
        desc: `완료. 최종 레벨: [${level.join(', ')}]. 총 감소량 = ${answer}`,
        bars: level.map((v, i) => ({ value: v, original: initial[i], state: 'done' })),
        answer, currentI: null, diff: null
      });

      return steps;
    };

    const STEPS = generateSimulationSteps(INITIAL_LEVELS);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\.)/g);
      const keywords = new Set(['for', 'in', 'if']);
      const builtins = new Set(['int', 'input', 'range', 'print']);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!=', '*'].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) {
          setCurrentStepIdx(prev => prev + 1);
        } else {
          setIsPlaying(false);
        }
      }, [currentStepIdx]);

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const handleReset = () => {
        setCurrentStepIdx(0);
        setIsPlaying(false);
      };

      const togglePlay = () => {
        if (isEnd) handleReset();
        setIsPlaying(!isPlaying);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(handleNext, 1200);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      // 활성 코드 라인으로 자동 스크롤
      useEffect(() => {
        if (codeViewerRef.current && stepData.codeLine !== null) {
          const activeEl = codeViewerRef.current.querySelector('[data-active="true"]');
          if (activeEl) {
            activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }, [currentStepIdx]);

      const maxVal = Math.max(...INITIAL_LEVELS, ...stepData.bars.map(b => b.value));

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">그리디: 게임을 만든 동준이 시각화</h1>
              <p className="text-slate-600">
                각 레벨의 점수가 <b>순증가</b>하도록 만들어야 합니다. 뒤에서부터 확인하며,
                이전 레벨이 현재 레벨 이상이면 (현재-1)로 낮춥니다. 감소시킨 총량이 최소가 됩니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700 flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg font-semibold text-slate-800">레벨 점수 상태</h2>
                    <div className="flex space-x-3 text-xs text-slate-500">
                      <div className="flex items-center"><span className="w-3 h-3 bg-blue-500 rounded-sm mr-1"></span> 현재</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-orange-500 rounded-sm mr-1"></span> 확인중</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-red-400 rounded-sm mr-1"></span> 조정됨</div>
                    </div>
                  </div>

                  <div className="flex items-end justify-center h-48 border-b-2 border-slate-300 pb-1 mb-4 space-x-4">
                    {stepData.bars.map((bar, idx) => {
                      const heightPct = Math.max(10, (bar.value / maxVal) * 100);
                      const origPct = Math.max(10, (bar.original / maxVal) * 100);
                      let barClass = "w-14 rounded-t-md flex flex-col justify-end items-center text-sm font-bold pb-2 relative ";
                      if (bar.state === 'current') barClass += "bg-blue-500 text-white shadow-lg scale-105 border-b-4 border-blue-700";
                      else if (bar.state === 'checking') barClass += "bg-orange-400 text-white border-b-4 border-orange-600";
                      else if (bar.state === 'adjusted') barClass += "bg-red-400 text-white border-b-4 border-red-600";
                      else if (bar.state === 'ok') barClass += "bg-emerald-400 text-white border-b-4 border-emerald-600";
                      else if (bar.state === 'done') barClass += "bg-emerald-500 text-white border-b-4 border-emerald-700";
                      else barClass += "bg-slate-200 text-slate-500";

                      return (
                        <div key={idx} className="flex flex-col items-center">
                          {bar.original !== bar.value && (
                            <div className="text-xs text-red-400 line-through mb-0.5">{bar.original}</div>
                          )}
                          <div className={barClass} style={{ height: `${heightPct}%`, transition: 'all 0.3s' }}>{bar.value}</div>
                          <div className="text-xs text-slate-400 mt-2 font-mono">Lv{idx+1}</div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 space-y-2">
                    {stepData.diff !== null && (
                      <div className="flex justify-between text-sm">
                        <span className="text-slate-600">이번 감소량</span>
                        <span className="font-bold text-red-600">-{stepData.diff}</span>
                      </div>
                    )}
                    <div className="flex justify-between items-center bg-slate-800 text-white p-3 rounded-md shadow-sm">
                      <span className="font-semibold text-sm">총 감소량 <code className="bg-slate-700 px-1 text-xs rounded">answer</code></span>
                      <span className="text-2xl font-bold text-emerald-400">{stepData.answer}</span>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">
                      {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 재생</>)}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (<div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}><span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span></div>);
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
