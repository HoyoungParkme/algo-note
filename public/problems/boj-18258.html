<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>큐: 큐 2 - 백준 18258</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "import sys",
      "from collections import deque",
      "",
      "N = int(input())",
      "q = deque([])",
      "",
      "for i in range(N):",
      "    command = sys.stdin.readline().split()",
      "",
      "    if command[0] == 'push':",
      "        q.append(command[1])",
      "",
      "    if command[0] == 'pop':",
      "        if len(q) > 0:",
      "            print(q.popleft())",
      "        else:",
      "            print(-1)",
      "",
      "    if command[0] == 'size':",
      "        print(len(q))",
      "",
      "    if command[0] == 'empty':",
      "        if len(q) == 0:",
      "            print(1)",
      "        else:",
      "            print(0)",
      "",
      "    if command[0] == 'front':",
      "        if len(q) > 0:",
      "            print(q[0])",
      "        else:",
      "            print(-1)",
      "",
      "    if command[0] == 'back':",
      "        if len(q) > 0:",
      "            print(q[-1])",
      "        else:",
      "            print(-1)"
    ];

    const INITIAL_COMMANDS = [
      ["push", "1"], ["push", "2"], ["front"], ["back"], ["size"],
      ["pop"], ["pop"], ["pop"], ["empty"], ["push", "3"], ["front"]
    ];

    const generateSimulationSteps = (commands) => {
      const steps = [];
      const q = [];
      const outputs = [];

      steps.push({
        codeLine: 4,
        desc: `빈 큐를 초기화합니다. 총 ${commands.length}개의 명령을 처리합니다.`,
        queue: [...q],
        command: null,
        output: null,
        outputs: [...outputs],
        highlight: null
      });

      for (let i = 0; i < commands.length; i++) {
        const cmd = commands[i];
        const cmdStr = cmd.join(' ');

        steps.push({
          codeLine: 7,
          desc: `${i + 1}번째 명령: "${cmdStr}"을(를) 읽습니다.`,
          queue: [...q],
          command: cmdStr,
          output: null,
          outputs: [...outputs],
          highlight: null
        });

        if (cmd[0] === 'push') {
          q.push(cmd[1]);
          steps.push({
            codeLine: 10,
            desc: `push ${cmd[1]}: 큐의 뒤쪽에 ${cmd[1]}을(를) 추가합니다.`,
            queue: [...q],
            command: cmdStr,
            output: null,
            outputs: [...outputs],
            highlight: 'back'
          });
        } else if (cmd[0] === 'pop') {
          if (q.length > 0) {
            const val = q.shift();
            outputs.push(val);
            steps.push({
              codeLine: 14,
              desc: `pop: 큐의 앞쪽에서 ${val}을(를) 꺼내 출력합니다.`,
              queue: [...q],
              command: cmdStr,
              output: val,
              outputs: [...outputs],
              highlight: 'front'
            });
          } else {
            outputs.push(-1);
            steps.push({
              codeLine: 16,
              desc: `pop: 큐가 비어있으므로 -1을 출력합니다.`,
              queue: [...q],
              command: cmdStr,
              output: -1,
              outputs: [...outputs],
              highlight: null
            });
          }
        } else if (cmd[0] === 'size') {
          outputs.push(q.length);
          steps.push({
            codeLine: 19,
            desc: `size: 현재 큐의 크기 ${q.length}을(를) 출력합니다.`,
            queue: [...q],
            command: cmdStr,
            output: q.length,
            outputs: [...outputs],
            highlight: null
          });
        } else if (cmd[0] === 'empty') {
          const val = q.length === 0 ? 1 : 0;
          outputs.push(val);
          steps.push({
            codeLine: q.length === 0 ? 23 : 25,
            desc: `empty: 큐가 ${q.length === 0 ? '비어있으므로 1' : '비어있지 않으므로 0'}을(를) 출력합니다.`,
            queue: [...q],
            command: cmdStr,
            output: val,
            outputs: [...outputs],
            highlight: null
          });
        } else if (cmd[0] === 'front') {
          if (q.length > 0) {
            outputs.push(q[0]);
            steps.push({
              codeLine: 29,
              desc: `front: 큐의 맨 앞 원소 ${q[0]}을(를) 출력합니다.`,
              queue: [...q],
              command: cmdStr,
              output: q[0],
              outputs: [...outputs],
              highlight: 'front'
            });
          } else {
            outputs.push(-1);
            steps.push({
              codeLine: 31,
              desc: `front: 큐가 비어있으므로 -1을 출력합니다.`,
              queue: [...q],
              command: cmdStr,
              output: -1,
              outputs: [...outputs],
              highlight: null
            });
          }
        } else if (cmd[0] === 'back') {
          if (q.length > 0) {
            outputs.push(q[q.length - 1]);
            steps.push({
              codeLine: 35,
              desc: `back: 큐의 맨 뒤 원소 ${q[q.length - 1]}을(를) 출력합니다.`,
              queue: [...q],
              command: cmdStr,
              output: q[q.length - 1],
              outputs: [...outputs],
              highlight: 'back'
            });
          } else {
            outputs.push(-1);
            steps.push({
              codeLine: 37,
              desc: `back: 큐가 비어있으므로 -1을 출력합니다.`,
              queue: [...q],
              command: cmdStr,
              output: -1,
              outputs: [...outputs],
              highlight: null
            });
          }
        }
      }

      steps.push({
        codeLine: null,
        desc: `모든 명령 처리 완료. 총 ${outputs.length}개의 출력을 생성했습니다.`,
        queue: [...q],
        command: null,
        output: null,
        outputs: [...outputs],
        highlight: null
      });

      return steps;
    };

    const STEPS = generateSimulationSteps(INITIAL_COMMANDS);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\.)/g);

      const keywords = new Set(['import', 'from', 'for', 'in', 'if', 'else']);
      const builtins = new Set(['int', 'input', 'range', 'len', 'print']);
      const methods = new Set(['readline', 'split', 'append', 'popleft']);
      const modules = new Set(['sys', 'collections', 'deque']);

      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (methods.has(token)) return <span key={i} className="text-yellow-200">{token}</span>;
        if (modules.has(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (/^['"]/.test(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) {
          setCurrentStepIdx(prev => prev + 1);
        } else {
          setIsPlaying(false);
        }
      }, [currentStepIdx]);

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const handleReset = () => {
        setCurrentStepIdx(0);
        setIsPlaying(false);
      };

      const togglePlay = () => {
        if (isEnd) handleReset();
        setIsPlaying(!isPlaying);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(handleNext, 1200);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current && stepData.codeLine !== null) {
          const activeEl = codeViewerRef.current.querySelector('[data-active="true"]');
          if (activeEl) {
          // activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }, [currentStepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">큐: 큐 2 시각화</h1>
              <p className="text-slate-600">
                큐(Queue)는 <b>선입선출(FIFO)</b> 자료구조입니다. push로 뒤에 추가하고, pop으로 앞에서 꺼냅니다.
                size, empty, front, back 등 다양한 연산을 지원합니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700 flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              <div className="flex flex-col space-y-6">

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg font-semibold text-slate-800">큐 상태</h2>
                    <div className="flex space-x-3 text-xs text-slate-500">
                      <div className="flex items-center"><span className="w-3 h-3 bg-blue-500 rounded-sm mr-1"></span> front</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-emerald-500 rounded-sm mr-1"></span> back</div>
                    </div>
                  </div>

                  {/* 현재 명령 */}
                  {stepData.command && (
                    <div className="mb-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg">
                      <span className="text-sm text-yellow-800 font-mono font-bold">&gt; {stepData.command}</span>
                    </div>
                  )}

                  {/* 큐 시각화 (가로) */}
                  <div className="flex-1 flex flex-col items-center justify-center">
                    <div className="flex items-center space-x-1 min-h-[80px]">
                      <div className="text-xs text-slate-500 font-mono mr-2">front →</div>
                      {stepData.queue.length === 0 && (
                        <div className="text-slate-400 text-sm italic px-8">비어있음</div>
                      )}
                      {stepData.queue.map((val, idx) => {
                        const isFront = idx === 0;
                        const isBack = idx === stepData.queue.length - 1;
                        const isHighlightFront = stepData.highlight === 'front' && isFront;
                        const isHighlightBack = stepData.highlight === 'back' && isBack;

                        return (
                          <div
                            key={idx}
                            className={`w-14 h-14 flex items-center justify-center rounded-lg font-bold text-lg border-2 ${
                              isHighlightFront
                                ? 'bg-blue-500 border-blue-700 text-white scale-110 shadow-lg'
                                : isHighlightBack
                                ? 'bg-emerald-500 border-emerald-700 text-white scale-110 shadow-lg'
                                : isFront
                                ? 'bg-blue-100 border-blue-300 text-blue-800'
                                : isBack
                                ? 'bg-emerald-100 border-emerald-300 text-emerald-800'
                                : 'bg-slate-100 border-slate-200 text-slate-700'
                            }`}
                            style={{ transition: 'all 0.3s' }}
                          >
                            {val}
                          </div>
                        );
                      })}
                      <div className="text-xs text-slate-500 font-mono ml-2">← back</div>
                    </div>
                  </div>

                  {/* 출력 로그 */}
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mt-4 space-y-2">
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-600">큐 크기</span>
                      <span className="font-bold text-slate-800">{stepData.queue.length}</span>
                    </div>
                    {stepData.output !== null && (
                      <div className="flex justify-between items-center bg-slate-800 text-white p-3 rounded-md shadow-sm">
                        <span className="font-semibold text-sm">출력</span>
                        <span className="text-2xl font-bold text-emerald-400">{stepData.output}</span>
                      </div>
                    )}
                    <div className="pt-2 border-t border-slate-200">
                      <h4 className="text-xs text-slate-500 mb-1">출력 이력</h4>
                      <div className="text-sm font-mono text-slate-600 max-h-16 overflow-y-auto">
                        {stepData.outputs.length === 0
                          ? <span className="italic text-slate-400">없음</span>
                          : stepData.outputs.join(', ')
                        }
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 일시정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 재생</>
                      )}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">
                    진행도: {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          data-active={isActive ? 'true' : 'false'}
                          className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}
                        >
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
