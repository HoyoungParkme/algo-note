<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>큐: 요세푸스 문제 - 백준 1158</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "from collections import deque",
      "",
      "N, K = map(int, input().split())",
      "",
      "# 1부터 N까지 사람을 원형 큐에 배치",
      "people = [i for i in range(1, N+1)]",
      "q = deque(people)",
      "",
      "answer = []",
      "",
      "# N명 모두 제거될 때까지 반복",
      "for i in range(N):",
      "    # K-1칸 회전 (앞에서 빼서 뒤로)",
      "    q.rotate(-(K - 1))",
      "",
      "    # K번째 사람 제거",
      "    answer.append(q.popleft())",
      "",
      "print('<' + ', '.join(map(str, answer)) + '>')"
    ];

    const INITIAL_N = 7;
    const INITIAL_K = 3;

    const generateSimulationSteps = (N, K) => {
      const steps = [];
      const q = [];
      const answer = [];

      for (let i = 1; i <= N; i++) q.push(i);

      steps.push({
        codeLine: 6,
        desc: `${N}명의 사람을 원형으로 배치합니다. K = ${K} (${K}번째 사람을 제거).`,
        queue: [...q],
        answer: [...answer],
        currentPerson: null,
        rotateCount: 0,
        action: 'init'
      });

      for (let i = 0; i < N; i++) {
        steps.push({
          codeLine: 11,
          desc: `${i + 1}번째 제거를 시작합니다. 현재 원형 큐: [${q.join(', ')}]`,
          queue: [...q],
          answer: [...answer],
          currentPerson: null,
          rotateCount: 0,
          action: 'start-round'
        });

        // rotate -(K-1): K-1번 앞에서 빼서 뒤로
        for (let r = 0; r < K - 1; r++) {
          const moved = q.shift();
          q.push(moved);
          steps.push({
            codeLine: 13,
            desc: `회전 ${r + 1}/${K - 1}: ${moved}을(를) 앞에서 빼서 뒤로 보냅니다.`,
            queue: [...q],
            answer: [...answer],
            currentPerson: moved,
            rotateCount: r + 1,
            action: 'rotate'
          });
        }

        const removed = q.shift();
        answer.push(removed);
        steps.push({
          codeLine: 16,
          desc: `${K}번째 사람 ${removed}을(를) 제거합니다. 요세푸스 순열: <${answer.join(', ')}>`,
          queue: [...q],
          answer: [...answer],
          currentPerson: removed,
          rotateCount: 0,
          action: 'remove'
        });
      }

      steps.push({
        codeLine: 18,
        desc: `모든 사람이 제거되었습니다. 요세푸스 순열: <${answer.join(', ')}>`,
        queue: [...q],
        answer: [...answer],
        currentPerson: null,
        rotateCount: 0,
        action: 'result'
      });

      return steps;
    };

    const STEPS = generateSimulationSteps(INITIAL_N, INITIAL_K);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\.)/g);

      const keywords = new Set(['from', 'import', 'for', 'in']);
      const builtins = new Set(['int', 'input', 'range', 'map', 'str', 'print']);
      const methods = new Set(['split', 'rotate', 'popleft', 'append', 'join']);
      const modules = new Set(['collections', 'deque']);

      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (methods.has(token)) return <span key={i} className="text-yellow-200">{token}</span>;
        if (modules.has(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (/^['"]/.test(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) {
          setCurrentStepIdx(prev => prev + 1);
        } else {
          setIsPlaying(false);
        }
      }, [currentStepIdx]);

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const handleReset = () => {
        setCurrentStepIdx(0);
        setIsPlaying(false);
      };

      const togglePlay = () => {
        if (isEnd) handleReset();
        setIsPlaying(!isPlaying);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(handleNext, 800);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current && stepData.codeLine !== null) {
          const activeEl = codeViewerRef.current.querySelector('[data-active="true"]');
          if (activeEl) {
          // activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }, [currentStepIdx]);

      // 원형 배치 계산
      const allPeople = Array.from({ length: INITIAL_N }, (_, i) => i + 1);
      const radius = 100;
      const centerX = 130;
      const centerY = 130;

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">큐: 요세푸스 문제 시각화</h1>
              <p className="text-slate-600">
                1번부터 N번까지의 사람이 원을 이루어 앉아있습니다. 순서대로 <b>K번째 사람</b>을 제거하며,
                원에서 모두 제거될 때까지 반복합니다. 이때 제거되는 순서를 <b>요세푸스 순열</b>이라 합니다.
                deque의 <code className="bg-slate-100 px-1 rounded text-sm text-pink-600">rotate</code> 연산으로 원형 큐를 효율적으로 구현합니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700 flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              <div className="flex flex-col space-y-6">

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg font-semibold text-slate-800">원형 배치</h2>
                    <div className="flex space-x-3 text-xs text-slate-500">
                      <div className="flex items-center"><span className="w-3 h-3 bg-blue-500 rounded-sm mr-1"></span> 대기중</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-orange-500 rounded-sm mr-1"></span> 이동중</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-red-500 rounded-sm mr-1"></span> 제거</div>
                    </div>
                  </div>

                  {/* 원형 시각화 (SVG) */}
                  <div className="flex justify-center mb-4">
                    <svg width="260" height="260" viewBox="0 0 260 260">
                      {allPeople.map((person, idx) => {
                        const angle = (2 * Math.PI * idx) / INITIAL_N - Math.PI / 2;
                        const x = centerX + radius * Math.cos(angle);
                        const y = centerY + radius * Math.sin(angle);

                        const inQueue = stepData.queue.includes(person);
                        const isRemoved = stepData.answer.includes(person);
                        const isCurrent = stepData.currentPerson === person;
                        const isFront = stepData.queue.length > 0 && stepData.queue[0] === person;

                        let fill, stroke, textFill, opacity;
                        if (isCurrent && stepData.action === 'remove') {
                          fill = '#ef4444'; stroke = '#b91c1c'; textFill = '#fff'; opacity = 1;
                        } else if (isCurrent && stepData.action === 'rotate') {
                          fill = '#f97316'; stroke = '#c2410c'; textFill = '#fff'; opacity = 1;
                        } else if (isRemoved) {
                          fill = '#e2e8f0'; stroke = '#cbd5e1'; textFill = '#94a3b8'; opacity = 0.4;
                        } else if (isFront) {
                          fill = '#3b82f6'; stroke = '#1d4ed8'; textFill = '#fff'; opacity = 1;
                        } else if (inQueue) {
                          fill = '#dbeafe'; stroke = '#93c5fd'; textFill = '#1e40af'; opacity = 1;
                        } else {
                          fill = '#e2e8f0'; stroke = '#cbd5e1'; textFill = '#94a3b8'; opacity = 0.4;
                        }

                        return (
                          <g key={person}>
                            <circle
                              cx={x} cy={y} r={18}
                              fill={fill} stroke={stroke} strokeWidth="2"
                              opacity={opacity}
                              style={{ transition: 'all 0.3s' }}
                            />
                            <text
                              x={x} y={y + 1}
                              textAnchor="middle" dominantBaseline="middle"
                              fill={textFill}
                              fontSize="14" fontWeight="bold"
                              fontFamily="'JetBrains Mono', monospace"
                              opacity={opacity}
                            >
                              {person}
                            </text>
                          </g>
                        );
                      })}
                    </svg>
                  </div>

                  {/* 큐 상태 (선형) */}
                  <div className="pt-4 border-t border-slate-100">
                    <h3 className="text-sm font-semibold text-slate-700 mb-2">큐 순서 (front → back)</h3>
                    <div className="flex space-x-1 overflow-x-auto p-2 bg-slate-50 border border-slate-200 rounded-lg min-h-[44px] items-center">
                      {stepData.queue.length === 0 && <span className="text-slate-400 text-sm italic">모두 제거됨</span>}
                      {stepData.queue.map((val, idx) => (
                        <div key={idx} className={`flex-shrink-0 w-8 h-8 flex items-center justify-center rounded text-sm font-bold ${
                          idx === 0 ? 'bg-blue-500 text-white' : 'bg-blue-100 text-blue-800'
                        }`}>
                          {val}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* 결과 순열 */}
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mt-4">
                    <div className="flex justify-between items-center">
                      <span className="text-sm font-semibold text-slate-700">요세푸스 순열</span>
                      <span className="font-bold text-slate-800 font-mono">
                        &lt;{stepData.answer.join(', ')}&gt;
                      </span>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 일시정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 재생</>
                      )}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">
                    진행도: {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          data-active={isActive ? 'true' : 'false'}
                          className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}
                        >
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
