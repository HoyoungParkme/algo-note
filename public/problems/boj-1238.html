<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다익스트라: 파티 - 백준 1238</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "from queue import PriorityQueue",
      "",
      "N, M, X = list(map(int, input().split()))  # 학생 수, 도로 수, 파티 장소",
      "X -= 1                                     # 0-indexed",
      "",
      "adj = [[] for _ in range(N)]               # 정방향 그래프",
      "r_adj = [[] for _ in range(N)]             # 역방향 그래프",
      "for _ in range(M):",
      "    start, end, time = list(map(int, input().split()))",
      "    adj[start-1].append((end-1, time))     # 정방향",
      "    r_adj[end-1].append((start-1, time))   # 역방향",
      "",
      "# X에서 출발: 역방향 그래프로 모든 노드→X 거리 계산",
      "dist = [1e9] * N",
      "dist[X] = 0",
      "pq = PriorityQueue()",
      "pq.put((0, X))",
      "while pq.qsize() != 0:",
      "    d, u = pq.get()",
      "    if d != dist[u]: continue",
      "    for v, w in adj[u]:                    # 정방향 → X→v 최단거리",
      "        if dist[v] > dist[u] + w:",
      "            dist[v] = dist[u] + w",
      "            pq.put((dist[v], v))",
      "",
      "# X로 돌아오기: 정방향 그래프로 모든 노드→X 거리 계산",
      "r_dist = [1e9] * N",
      "r_dist[X] = 0",
      "pq = PriorityQueue()",
      "pq.put((0, X))",
      "while pq.qsize() != 0:",
      "    d, u = pq.get()",
      "    if d != r_dist[u]: continue",
      "    for v, w in r_adj[u]:                  # 역방향 → v→X 최단거리",
      "        if r_dist[v] > r_dist[u] + w:",
      "            r_dist[v] = r_dist[u] + w",
      "            pq.put((r_dist[v], v))",
      "",
      "max_dist = 0",
      "for i in range(N):                         # 왕복 최대 소요 시간",
      "    if max_dist < dist[i] + r_dist[i]:",
      "        max_dist = dist[i] + r_dist[i]",
      "print(max_dist)"
    ];

    const N = 4, X = 2; // 0-indexed
    const EDGES_RAW = [[1,2,4],[1,3,2],[1,4,7],[2,1,1],[3,2,3],[3,4,2],[4,2,1]];
    const EDGES = EDGES_RAW.map(([u,v,w]) => [u-1,v-1,w]);
    const ADJ = Array.from({length: N}, () => []);
    const R_ADJ = Array.from({length: N}, () => []);
    EDGES.forEach(([u,v,w]) => { ADJ[u].push([v,w]); R_ADJ[v].push([u,w]); });

    const NODE_POS = [
      {x:100, y:160},
      {x:230, y:80},
      {x:360, y:160},
      {x:230, y:240},
    ];

    const INF = 1e9;

    function dijkstra(adj, start, n) {
      const d = new Array(n).fill(INF);
      d[start] = 0;
      const pq = [[0, start]];
      const steps = [];

      steps.push({ d: [...d], pq: [...pq], current: null, phase: '' });

      while (pq.length > 0) {
        pq.sort((a,b) => a[0]-b[0]);
        const [dist, u] = pq.shift();
        if (dist !== d[u]) continue;

        steps.push({ d: [...d], pq: [...pq], current: u, phase: '' });

        for (const [v, w] of adj[u]) {
          if (d[v] > d[u] + w) {
            d[v] = d[u] + w;
            pq.push([d[v], v]);
            steps.push({ d: [...d], pq: [...pq], current: u, checking: v, phase: '' });
          }
        }
      }
      steps.push({ d: [...d], pq: [], current: null, phase: 'done' });
      return { finalDist: d, steps };
    }

    const { finalDist: distFromX, steps: stepsForward } = dijkstra(ADJ, X, N);
    const { finalDist: distToX, steps: stepsReverse } = dijkstra(R_ADJ, X, N);

    const ALL_STEPS = [
      { codeLine: 12, desc: `X=${X+1}에서 출발 다익스트라 시작 (정방향 그래프).`, phase: 'forward', dist: stepsForward[0].d, rdist: new Array(N).fill(INF), current: null, checking: null, pq: [], result: null },
      ...stepsForward.map((s, i) => ({
        codeLine: i === stepsForward.length-1 ? 24 : 20,
        desc: s.current !== null ? `노드 ${s.current+1} 처리 중 (도착 거리: ${s.d[s.current]}).` : (s.phase === 'done' ? `X→각 노드 거리 계산 완료.` : `정방향 다익스트라 시작.`),
        phase: 'forward', dist: s.d, rdist: new Array(N).fill(INF), current: s.current, checking: s.checking || null, pq: s.pq, result: null,
      })),
      { codeLine: 25, desc: `역방향 그래프로 다익스트라 시작 → 각 노드에서 X(${X+1})까지의 거리를 구합니다.`, phase: 'reverse', dist: distFromX, rdist: stepsReverse[0].d, current: null, checking: null, pq: [], result: null },
      ...stepsReverse.map((s, i) => ({
        codeLine: i === stepsReverse.length-1 ? 36 : 33,
        desc: s.current !== null ? `역방향 노드 ${s.current+1} 처리 중.` : (s.phase === 'done' ? `각 노드→X 거리 계산 완료.` : `역방향 다익스트라 시작.`),
        phase: 'reverse', dist: distFromX, rdist: s.d, current: s.current, checking: s.checking || null, pq: s.pq, result: null,
      })),
      ...[0,1,2,3].map(i => {
        const total = distFromX[i] + distToX[i];
        return {
          codeLine: 39,
          desc: `노드 ${i+1}: X→${i+1} = ${distFromX[i]}, ${i+1}→X = ${distToX[i]}, 합계 = ${total}`,
          phase: 'result', dist: distFromX, rdist: distToX, current: i, checking: null, pq: [], result: Math.max(...[0,1,2,3].slice(0,i+1).map(j => distFromX[j]+distToX[j])),
        };
      }),
      { codeLine: 41, desc: `최대 왕복 시간 = ${Math.max(...[0,1,2,3].map(i=>distFromX[i]+distToX[i]))}`, phase: 'done', dist: distFromX, rdist: distToX, current: null, checking: null, pq: [], result: Math.max(...[0,1,2,3].map(i=>distFromX[i]+distToX[i])) },
    ];

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\.)/g);
      const keywords = new Set(['from','import','for','in','if','while','not','continue','range','else']);
      const builtins = new Set(['int','input','list','map','print','range','max']);
      const modules = new Set(['queue','PriorityQueue','heapq']);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (modules.has(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=','+','-','<','>','==','!=','>','>='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = ALL_STEPS[currentStepIdx];
      const isEnd = currentStepIdx === ALL_STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < ALL_STEPS.length - 1) setCurrentStepIdx(p => p + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1000);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const el = codeViewerRef.current.querySelector('[data-active="true"]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [currentStepIdx]);

      const getNodeStyle = (i) => {
        if (i === X) return { fill: '#7c3aed', stroke: '#c4b5fd', text: 'white' };
        if (stepData.current === i) return { fill: '#2563eb', stroke: '#93c5fd', text: 'white' };
        if (stepData.checking === i) return { fill: '#f97316', stroke: '#fed7aa', text: 'white' };
        return { fill: '#e2e8f0', stroke: '#94a3b8', text: '#64748b' };
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">다익스트라: 파티 시각화</h1>
              <p className="text-slate-600">
                각 학생이 X번 마을에 갔다가 돌아오는 <b>왕복 최단 시간</b>의 최댓값을 구합니다.
                ① X에서 출발(정방향) → ② 역방향 그래프에서 X 출발 = X까지 돌아오는 거리
              </p>
            </header>

            <div className={`text-white p-5 rounded-xl shadow-sm border transition-colors duration-300 ${stepData.phase === 'forward' ? 'bg-blue-600 border-blue-700' : stepData.phase === 'reverse' ? 'bg-violet-600 border-violet-700' : 'bg-emerald-600 border-emerald-700'}`}>
              <h3 className="text-xs font-bold mb-2 uppercase tracking-wider opacity-70">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <h2 className="text-lg font-semibold text-slate-800 mb-4">그래프 (파티 장소: 노드 {X+1})</h2>

                  <div className="flex justify-center mb-4">
                    <svg width="460" height="320" className="rounded-lg bg-slate-50 border border-slate-200">
                      <defs>
                        <marker id="arrow3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                          <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
                        </marker>
                      </defs>
                      {EDGES.map(([u,v,w], ei) => {
                        const pu = NODE_POS[u], pv = NODE_POS[v];
                        const dx=pv.x-pu.x, dy=pv.y-pu.y, len=Math.sqrt(dx*dx+dy*dy);
                        const nx=dx/len, ny=dy/len;
                        const mx=(pu.x+pv.x)/2-ny*12, my=(pu.y+pv.y)/2+nx*12;
                        return (
                          <g key={ei}>
                            <line x1={pu.x+nx*26} y1={pu.y+ny*26} x2={pv.x-nx*28} y2={pv.y-ny*28} stroke="#94a3b8" strokeWidth="1.5" markerEnd="url(#arrow3)"/>
                            <text x={mx} y={my} textAnchor="middle" fill="#64748b" fontSize="11" fontWeight="bold">{w}</text>
                          </g>
                        );
                      })}
                      {Array.from({length: N}, (_, i) => {
                        const s = getNodeStyle(i);
                        const pos = NODE_POS[i];
                        return (
                          <g key={i}>
                            <circle cx={pos.x} cy={pos.y} r="26" fill={s.fill} stroke={s.stroke} strokeWidth="2.5" style={{transition:'fill 0.3s'}}/>
                            <text x={pos.x} y={pos.y+1} textAnchor="middle" dominantBaseline="middle" fill={s.text} fontWeight="bold" fontSize="15">{i+1}</text>
                            {i === X && <text x={pos.x} y={pos.y+14} textAnchor="middle" fill={s.text} fontSize="8">파티</text>}
                          </g>
                        );
                      })}
                    </svg>
                  </div>

                  {/* 거리 테이블 */}
                  <div className="grid grid-cols-4 gap-1 text-xs">
                    <div className="col-span-4 grid grid-cols-5 gap-1 mb-1 font-bold text-slate-500">
                      <div className="text-center">노드</div>
                      {Array.from({length:N}, (_,i) => <div key={i} className="text-center">{i+1}{i===X?'(X)':''}</div>)}
                    </div>
                    <div className="col-span-4 grid grid-cols-5 gap-1 mb-1">
                      <div className="text-xs text-blue-600 font-bold flex items-center">X→v</div>
                      {stepData.dist.map((d,i) => (
                        <div key={i} className={`text-center py-1 rounded border font-mono text-xs font-bold transition-all ${stepData.current === i && stepData.phase !== 'reverse' ? 'bg-blue-100 border-blue-400 text-blue-700' : d < INF ? 'bg-blue-50 border-blue-200 text-blue-700' : 'bg-slate-50 border-slate-200 text-slate-400'}`}>
                          {d === INF ? '∞' : d}
                        </div>
                      ))}
                    </div>
                    <div className="col-span-4 grid grid-cols-5 gap-1 mb-1">
                      <div className="text-xs text-violet-600 font-bold flex items-center">v→X</div>
                      {stepData.rdist.map((d,i) => (
                        <div key={i} className={`text-center py-1 rounded border font-mono text-xs font-bold transition-all ${stepData.current === i && stepData.phase === 'reverse' ? 'bg-violet-100 border-violet-400 text-violet-700' : d < INF ? 'bg-violet-50 border-violet-200 text-violet-700' : 'bg-slate-50 border-slate-200 text-slate-400'}`}>
                          {d === INF ? '∞' : d}
                        </div>
                      ))}
                    </div>
                    {(stepData.phase === 'result' || stepData.phase === 'done') && (
                      <div className="col-span-4 grid grid-cols-5 gap-1">
                        <div className="text-xs text-emerald-600 font-bold flex items-center">합계</div>
                        {Array.from({length:N}, (_,i) => {
                          const total = stepData.dist[i] + stepData.rdist[i];
                          const isMax = total === stepData.result;
                          return (
                            <div key={i} className={`text-center py-1 rounded border font-mono text-xs font-bold ${isMax ? 'bg-emerald-100 border-emerald-400 text-emerald-700' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>
                              {total >= INF ? '∞' : total}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {stepData.result !== null && (
                    <div className="mt-3 p-3 bg-slate-800 rounded-lg flex justify-between items-center">
                      <span className="text-slate-300 text-sm">최대 왕복 시간</span>
                      <span className="text-2xl font-bold text-emerald-400">{stepData.result}</span>
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {ALL_STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden" style={{ minHeight: '500px' }}>
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
