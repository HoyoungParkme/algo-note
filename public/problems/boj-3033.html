<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>라빈-카프: 가장 긴 문자열 - 백준 3033</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "import sys",
      "input = sys.stdin.readline",
      "",
      "N = int(input())                         # 문자열 길이",
      "S = input().rstrip()                     # 입력 문자열",
      "",
      "# 라빈-카프 해싱: 길이 mid로 2번 이상 등장하는지 검사",
      "def check(mid):",
      "    BASE, MOD = 26, 10**9 + 7",
      "    h = 0",
      "    for c in S[:mid]:                    # 첫 윈도우 해시 계산",
      "        h = (h * BASE + ord(c)) % MOD",
      "",
      "    seen = {h}                           # 첫 해시 저장",
      "    power = pow(BASE, mid-1, MOD)        # BASE^(mid-1) mod MOD",
      "",
      "    for i in range(mid, N):              # 슬라이딩 윈도우",
      "        h = (h - ord(S[i-mid]) * power % MOD + MOD) % MOD",
      "        h = (h * BASE + ord(S[i])) % MOD # 새 문자 추가",
      "",
      "        if h in seen:                    # 같은 해시 발견!",
      "            return True                  # 2번 이상 등장",
      "        seen.add(h)                      # 해시 기록",
      "",
      "    return False                         # 등장 안 함",
      "",
      "# 이분 탐색으로 최대 길이 탐색",
      "left, right = 0, N",
      "while left < right:                      # 탐색 범위 좁히기",
      "    mid = (left + right + 1) // 2        # 오른쪽 편향 이분 탐색",
      "    if check(mid):                       # mid 길이가 가능하면",
      "        left = mid                       # 더 큰 값 탐색",
      "    else:",
      "        right = mid - 1                  # 더 작은 값 탐색",
      "",
      "print(left)                              # 최대 중복 길이 출력"
    ];

    // 예제 문자열 (짧게)
    const S = "abcabc";
    const N = S.length;

    const generateSimulationSteps = () => {
      const steps = [];
      const BASE = 26, MOD = 1000000007;

      const hashWindow = (s, mid) => {
        let h = 0;
        for (let i = 0; i < mid; i++) h = (h * BASE + s.charCodeAt(i)) % MOD;
        return h;
      };

      const checkMid = (mid) => {
        if (mid === 0) return true;
        let h = hashWindow(S, mid);
        const seen = new Map([[h, [0, mid]]]);
        const power = [...Array(mid-1)].reduce((acc) => (acc * BASE) % MOD, 1);
        for (let i = mid; i < N; i++) {
          h = ((h - (S.charCodeAt(i-mid) * power % MOD) + MOD) % MOD * BASE + S.charCodeAt(i)) % MOD;
          if (seen.has(h)) return { found: true, h, window: [i-mid+1, i+1], prev: seen.get(h) };
          seen.set(h, [i-mid+1, i+1]);
        }
        return { found: false };
      };

      // 이분 탐색 시뮬레이션
      let left = 0, right = N;
      let answer = 0;

      steps.push({
        codeLine: 25,
        desc: `이분 탐색 시작. left=0, right=${N}. 최대 중복 부분 문자열 길이를 찾습니다.`,
        left, right, mid: null, windowRange: null, prevRange: null, found: null,
        searchHistory: [], hashSteps: [],
      });

      const history = [];

      while (left < right) {
        const mid = Math.floor((left + right + 1) / 2);
        steps.push({
          codeLine: 28,
          desc: `mid = (${left}+${right}+1)//2 = ${mid}. 길이 ${mid}인 부분 문자열이 두 번 이상 나타나는지 확인합니다.`,
          left, right, mid, windowRange: null, prevRange: null, found: null,
          searchHistory: [...history],
        });

        const result = checkMid(mid);

        if (result === true || result.found) {
          if (result.found) {
            steps.push({
              codeLine: 29,
              desc: `✅ 길이 ${mid} 발견! "${S.slice(result.prev[0], result.prev[1])}"(위치${result.prev[0]})와 "${S.slice(result.window[0], result.window[1])}"(위치${result.window[0]})이 같습니다.`,
              left, right, mid, windowRange: result.window, prevRange: result.prev, found: true,
              searchHistory: [...history],
            });
          }
          left = mid;
          answer = mid;
          history.push({ mid, result: true });
          steps.push({
            codeLine: 30,
            desc: `길이 ${mid}는 가능 → left = ${left}. 더 긴 것 탐색.`,
            left, right, mid, windowRange: null, prevRange: null, found: true,
            searchHistory: [...history],
          });
        } else {
          history.push({ mid, result: false });
          right = mid - 1;
          steps.push({
            codeLine: 32,
            desc: `❌ 길이 ${mid}는 불가 → right = ${right}. 더 짧은 것 탐색.`,
            left, right, mid, windowRange: null, prevRange: null, found: false,
            searchHistory: [...history],
          });
        }
      }

      steps.push({
        codeLine: 34,
        desc: `이분 탐색 완료! 최대 중복 길이 = ${left}`,
        left, right, mid: null, windowRange: null, prevRange: null, found: null,
        searchHistory: [...history], answer: left,
      });

      return steps;
    };

    const STEPS = generateSimulationSteps();

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\/\/|\.)/g);
      const keywords = new Set(['import','def','return','for','in','if','while','range','not','True','False','else']);
      const builtins = new Set(['int','input','rstrip','len','ord','pow','print','set','add']);
      const modules = new Set(['sys','stdin','readline']);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (modules.has(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=','+','-','<','>','==','!=','+=','-=','//','**','%'].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(p => p + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1300);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const el = codeViewerRef.current.querySelector('[data-active="true"]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [currentStepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">라빈-카프: 가장 긴 중복 부분 문자열</h1>
              <p className="text-slate-600">
                <b>이분 탐색</b> + <b>라빈-카프 해싱</b>을 결합합니다.
                "길이 mid인 부분 문자열 중 두 번 이상 나타나는 것이 있는가?"를 O(N)에 판단하고, mid를 이분 탐색으로 좁혀 최대 길이를 찾습니다.
              </p>
            </header>

            <div className={`text-white p-5 rounded-xl shadow-sm border transition-colors ${stepData.found === true ? 'bg-emerald-600 border-emerald-700' : stepData.found === false ? 'bg-red-600 border-red-700' : 'bg-blue-600 border-blue-700'}`}>
              <h3 className="text-xs font-bold mb-2 uppercase tracking-wider opacity-70">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <h2 className="text-lg font-semibold text-slate-800 mb-4">이분 탐색 + 라빈-카프 시각화</h2>

                  {/* 문자열 표시 */}
                  <div className="mb-5">
                    <div className="text-xs text-slate-500 mb-2">입력 문자열 S = "{S}"</div>
                    <div className="flex gap-1">
                      {S.split('').map((ch, i) => {
                        const inWindow = stepData.windowRange && i >= stepData.windowRange[0] && i < stepData.windowRange[1];
                        const inPrev = stepData.prevRange && i >= stepData.prevRange[0] && i < stepData.prevRange[1];
                        return (
                          <div key={i} className={`flex-1 h-12 flex flex-col items-center justify-center rounded-lg border-2 font-mono font-bold text-lg transition-all duration-300 ${
                            inWindow ? 'bg-emerald-100 border-emerald-400 text-emerald-700 scale-110' :
                            inPrev ? 'bg-blue-100 border-blue-400 text-blue-700 scale-110' :
                            'bg-slate-50 border-slate-200 text-slate-600'
                          }`}>
                            {ch}
                            <span className="text-xs font-normal text-slate-400">{i}</span>
                          </div>
                        );
                      })}
                    </div>
                    {stepData.windowRange && stepData.prevRange && (
                      <div className="mt-2 flex gap-4 text-xs">
                        <span className="text-blue-600">■ 이전: "{S.slice(stepData.prevRange[0], stepData.prevRange[1])}"</span>
                        <span className="text-emerald-600">■ 현재: "{S.slice(stepData.windowRange[0], stepData.windowRange[1])}"</span>
                      </div>
                    )}
                  </div>

                  {/* 이분 탐색 범위 */}
                  <div className="mb-4 bg-slate-800 p-4 rounded-xl">
                    <div className="flex justify-between text-sm text-slate-300 mb-2">
                      <span>left = <span className="text-blue-400 font-bold font-mono">{stepData.left}</span></span>
                      {stepData.mid !== null && <span>mid = <span className="text-amber-400 font-bold font-mono">{stepData.mid}</span></span>}
                      <span>right = <span className="text-violet-400 font-bold font-mono">{stepData.right}</span></span>
                    </div>
                    <div className="relative h-6 bg-slate-700 rounded-full overflow-hidden">
                      {/* 유효 범위 */}
                      <div className="absolute h-full bg-slate-500 rounded-full transition-all duration-500"
                        style={{
                          left: `${(stepData.left / N) * 100}%`,
                          width: `${((stepData.right - stepData.left) / N) * 100}%`
                        }}
                      />
                      {/* mid 포인터 */}
                      {stepData.mid !== null && (
                        <div className="absolute h-full w-1 bg-amber-400 transition-all duration-500"
                          style={{ left: `${(stepData.mid / N) * 100}%` }}
                        />
                      )}
                    </div>
                    <div className="flex justify-between text-xs text-slate-500 mt-1">
                      <span>0</span><span>{N}</span>
                    </div>
                  </div>

                  {/* 탐색 이력 */}
                  <div className="border-t border-slate-100 pt-3">
                    <div className="text-xs text-slate-500 mb-2">이분 탐색 이력</div>
                    <div className="flex flex-wrap gap-2">
                      {stepData.searchHistory.map((h, i) => (
                        <div key={i} className={`px-2 py-1 rounded text-xs font-mono border ${h.result ? 'bg-emerald-100 border-emerald-400 text-emerald-700' : 'bg-red-100 border-red-300 text-red-600'}`}>
                          mid={h.mid} {h.result ? '✅' : '❌'}
                        </div>
                      ))}
                    </div>
                  </div>

                  {stepData.answer !== undefined && (
                    <div className="mt-4 p-4 bg-slate-800 rounded-xl flex justify-between items-center">
                      <span className="text-slate-300">최대 중복 부분 문자열 길이</span>
                      <div className="text-right">
                        <div className="text-3xl font-bold text-emerald-400">{stepData.answer}</div>
                        {stepData.answer > 0 && <div className="text-xs text-emerald-300">"{S.slice(0, stepData.answer)}"</div>}
                      </div>
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden" style={{ minHeight: '500px' }}>
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
