<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그리디 알고리즘: 밧줄 최대 중량 - 백준 2217</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "# N: 밧줄의 개수",
      "N = int(input())",
      "",
      "# 각 밧줄이 버틸 수 있는 최대 중량 입력",
      "ropes = [int(input()) for _ in range(N)]",
      "",
      "# 가장 튼튼한 밧줄부터 사용하기 위해 내림차순 정렬",
      "ropes.sort(reverse = True)",
      "",
      "# 견딜 수 있는 최대 총 중량",
      "max_weight = 0",
      "",
      "# 튼튼한 밧줄부터 하나씩 추가하며 최대 중량 계산",
      "for i in range(N):",
      "    # 기존 최대 중량과 비교하여 더 큰 값으로 갱신",
      "    max_weight = max(max_weight, ropes[i] * (i+1))"
    ];

    const INITIAL_ROPES = [10, 40, 5, 25, 20];

    const generateSimulationSteps = (initialRopes) => {
      const steps = [];
      const N = initialRopes.length;
      let ropes = [...initialRopes];
      let max_weight = 0;

      steps.push({
        codeLine: 4,
        desc: `초기 밧줄 상태입니다. N=${N}개의 밧줄이 주어졌습니다.`,
        ropes: [...ropes],
        maxWeight: max_weight,
        currentI: null,
        currentCalc: null
      });

      ropes.sort((a, b) => b - a);
      steps.push({
        codeLine: 7,
        desc: "가장 튼튼한 밧줄부터 병렬로 묶기 위해 중량 한계치를 내림차순으로 정렬합니다.",
        ropes: [...ropes],
        maxWeight: max_weight,
        currentI: null,
        currentCalc: null
      });

      steps.push({
        codeLine: 10,
        desc: "최대 중량을 기록할 변수 max_weight를 0으로 초기화합니다.",
        ropes: [...ropes],
        maxWeight: max_weight,
        currentI: null,
        currentCalc: null
      });

      for (let i = 0; i < N; i++) {
        steps.push({
          codeLine: 13,
          desc: `가장 튼튼한 밧줄부터 ${i + 1}개를 묶어봅니다. 여기서 가장 약한 밧줄(병목점)의 한계는 ${ropes[i]}입니다.`,
          ropes: [...ropes],
          maxWeight: max_weight,
          currentI: i,
          currentCalc: null
        });

        const current_weight = ropes[i] * (i + 1);
        const prev_max = max_weight;
        max_weight = Math.max(max_weight, current_weight);

        steps.push({
          codeLine: 15,
          desc: `(${ropes[i]}) × (밧줄 ${i + 1}개) = ${current_weight}. 기존 최대값(${prev_max})과 비교하여 더 크면 갱신합니다.`,
          ropes: [...ropes],
          maxWeight: max_weight,
          currentI: i,
          currentCalc: current_weight
        });
      }

      steps.push({
        codeLine: null,
        desc: `모든 밧줄의 조합을 확인했습니다. 들어 올릴 수 있는 최대 중량은 ${max_weight}입니다.`,
        ropes: [...ropes],
        maxWeight: max_weight,
        currentI: null,
        currentCalc: null
      });

      return steps;
    };

    const STEPS = generateSimulationSteps(INITIAL_ROPES);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\.)/g);

      const keywords = new Set(['for', 'in']);
      const builtins = new Set(['int', 'input', 'range', 'max']);
      const methods = new Set(['sort']);
      const properties = new Set(['reverse', 'True']);

      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (methods.has(token)) return <span key={i} className="text-yellow-200">{token}</span>;
        if (properties.has(token)) return <span key={i} className="text-purple-400">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!=', '*'].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) {
          setCurrentStepIdx(prev => prev + 1);
        } else {
          setIsPlaying(false);
        }
      }, [currentStepIdx]);

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const handleReset = () => {
        setCurrentStepIdx(0);
        setIsPlaying(false);
      };

      const togglePlay = () => {
        if (isEnd) handleReset();
        setIsPlaying(!isPlaying);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(handleNext, 1200);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      // 활성 코드 라인으로 자동 스크롤
      useEffect(() => {
        if (codeViewerRef.current && stepData.codeLine !== null) {
          const activeEl = codeViewerRef.current.querySelector('[data-active="true"]');
          if (activeEl) {
          // activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }, [currentStepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">그리디 알고리즘: 밧줄 최대 중량 구하기</h1>
              <p className="text-slate-600">
                묶인 밧줄들이 버틸 수 있는 전체 무게는 가장 한계치가 낮은 <b>'가장 약한 밧줄'</b>에 맞춰집니다.
                내림차순 정렬 후, 튼튼한 밧줄부터 병렬로 추가하며 최대 효율이 나오는 지점을 찾습니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700 flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              <div className="flex flex-col space-y-6">

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg font-semibold text-slate-800">밧줄 묶음 상태 및 중량 계산</h2>
                    <div className="flex space-x-3 text-xs text-slate-500">
                      <div className="flex items-center"><span className="w-3 h-3 bg-slate-200 rounded-sm mr-1"></span> 대기중</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-blue-500 rounded-sm mr-1"></span> 사용됨</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-orange-500 rounded-sm mr-1"></span> 약한 고리 (기준)</div>
                    </div>
                  </div>

                  <div className="flex items-end justify-center h-48 border-b-2 border-slate-300 pb-1 mb-6 space-x-3">
                    {stepData.ropes.map((weight, idx) => {
                      const isUsed = stepData.currentI !== null && idx <= stepData.currentI;
                      const isWeakest = stepData.currentI === idx;

                      let barClass = "w-14 rounded-t-md flex flex-col justify-end items-center text-sm font-bold pb-2 ";

                      if (isWeakest) {
                        barClass += "bg-orange-500 text-white shadow-lg z-10 border-b-4 border-orange-700";
                      } else if (isUsed) {
                        barClass += "bg-blue-500 text-white border-b-4 border-blue-700 opacity-90";
                      } else {
                        barClass += "bg-slate-200 text-slate-500";
                      }

                      const heightPct = Math.max(15, (weight / 40) * 100);

                      return (
                        <div key={idx} className="flex flex-col items-center">
                          <div className={barClass} style={{ height: `${heightPct}%`, transition: 'all 0.3s' }}>
                            {weight}
                          </div>
                          <div className="text-xs text-slate-400 mt-2 font-mono">idx: {idx}</div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 flex-1 flex flex-col justify-center space-y-3">
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-600">현재 사용된 밧줄 개수 <code className="bg-slate-200 px-1 rounded">(i+1)</code></span>
                      <span className="font-bold text-slate-800">{stepData.currentI !== null ? stepData.currentI + 1 : 0} 개</span>
                    </div>
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-600">가장 약한 밧줄 한계치 <code className="bg-slate-200 px-1 rounded">ropes[i]</code></span>
                      <span className="font-bold text-orange-600">{stepData.currentI !== null ? stepData.ropes[stepData.currentI] : '-'}</span>
                    </div>
                    <hr className="border-slate-200" />
                    <div className="flex justify-between items-center">
                      <span className="text-slate-700 font-semibold">산출 중량 <code className="bg-slate-200 px-1 text-xs rounded">ropes[i] * (i+1)</code></span>
                      <span className="text-xl font-bold text-blue-600">{stepData.currentCalc !== null ? stepData.currentCalc : '-'}</span>
                    </div>
                    <div className="flex justify-between items-center bg-slate-800 text-white p-3 rounded-md shadow-sm mt-2">
                      <span className="font-semibold text-sm">갱신된 최대 중량 <code className="bg-slate-700 px-1 text-xs rounded">max_weight</code></span>
                      <span className="text-2xl font-bold text-emerald-400">{stepData.maxWeight}</span>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 일시정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 재생</>
                      )}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">
                    진행도: {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          data-active={isActive ? 'true' : 'false'}
                          className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}
                        >
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
