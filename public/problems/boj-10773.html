<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스택: 제로 - 백준 10773</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "# K: 입력 횟수",
      "cnt = int(input())",
      "money = []",
      "",
      "for i in range(cnt):",
      "    n = int(input())",
      "",
      "    # 0이 입력되면 가장 최근 수를 지운다",
      "    if n == 0:",
      "        money.pop()",
      "    else:",
      "        money.append(n)",
      "",
      "# 최종 스택에 남은 수들의 합 출력",
      "print(sum(money))"
    ];

    const INITIAL_INPUT = [3, 0, 4, 0, 1];

    const generateSimulationSteps = (inputs) => {
      const steps = [];
      const money = [];

      steps.push({
        codeLine: 2,
        desc: `빈 리스트(스택) money를 초기화합니다. 총 ${inputs.length}개의 입력을 처리합니다.`,
        stack: [...money],
        currentInput: null,
        action: null,
        removedItem: null
      });

      for (let i = 0; i < inputs.length; i++) {
        const n = inputs[i];

        steps.push({
          codeLine: 5,
          desc: `${i + 1}번째 입력값 n = ${n}을(를) 읽습니다.`,
          stack: [...money],
          currentInput: n,
          action: null,
          removedItem: null
        });

        if (n === 0) {
          steps.push({
            codeLine: 8,
            desc: `n = 0 이므로, 가장 최근에 쓴 수를 지우는 조건에 해당합니다.`,
            stack: [...money],
            currentInput: n,
            action: 'check-zero',
            removedItem: null
          });

          const removed = money.pop();
          steps.push({
            codeLine: 9,
            desc: `스택에서 가장 위의 값 ${removed}을(를) 제거합니다. (pop)`,
            stack: [...money],
            currentInput: n,
            action: 'pop',
            removedItem: removed
          });
        } else {
          steps.push({
            codeLine: 10,
            desc: `n = ${n} 은 0이 아니므로, 스택에 추가합니다.`,
            stack: [...money],
            currentInput: n,
            action: 'check-nonzero',
            removedItem: null
          });

          money.push(n);
          steps.push({
            codeLine: 11,
            desc: `스택에 ${n}을(를) 추가합니다. (append)`,
            stack: [...money],
            currentInput: n,
            action: 'push',
            removedItem: null
          });
        }
      }

      const total = money.reduce((a, b) => a + b, 0);
      steps.push({
        codeLine: 14,
        desc: `모든 입력 처리 완료. 스택에 남은 수들의 합 = ${total}을(를) 출력합니다.`,
        stack: [...money],
        currentInput: null,
        action: 'result',
        removedItem: null
      });

      return steps;
    };

    const STEPS = generateSimulationSteps(INITIAL_INPUT);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\.)/g);

      const keywords = new Set(['for', 'in', 'if', 'else']);
      const builtins = new Set(['int', 'input', 'range', 'sum', 'print']);
      const methods = new Set(['pop', 'append']);

      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (methods.has(token)) return <span key={i} className="text-yellow-200">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) {
          setCurrentStepIdx(prev => prev + 1);
        } else {
          setIsPlaying(false);
        }
      }, [currentStepIdx]);

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const handleReset = () => {
        setCurrentStepIdx(0);
        setIsPlaying(false);
      };

      const togglePlay = () => {
        if (isEnd) handleReset();
        setIsPlaying(!isPlaying);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(handleNext, 1000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current && stepData.codeLine !== null) {
          const activeEl = codeViewerRef.current.querySelector('[data-active="true"]');
          if (activeEl) {
          // activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }, [currentStepIdx]);

      const maxStackHeight = 5;

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">스택: 제로 시각화</h1>
              <p className="text-slate-600">
                재현이가 잘못된 수를 부를 때마다 <b>0</b>을 외쳐서 가장 최근에 쓴 수를 지웁니다.
                이 되돌리기 동작은 <b>스택(LIFO)</b>의 pop 연산과 정확히 같습니다.
                모든 입력을 처리한 후 스택에 남은 수들의 합을 구합니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700 flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              <div className="flex flex-col space-y-6">

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg font-semibold text-slate-800">스택 상태</h2>
                    <div className="flex space-x-3 text-xs text-slate-500">
                      <div className="flex items-center"><span className="w-3 h-3 bg-blue-500 rounded-sm mr-1"></span> 스택 요소</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-emerald-500 rounded-sm mr-1"></span> 추가(push)</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-red-500 rounded-sm mr-1"></span> 제거(pop)</div>
                    </div>
                  </div>

                  {/* 입력값 표시 */}
                  <div className="mb-4">
                    <h3 className="text-sm font-semibold text-slate-700 mb-2">입력 순서</h3>
                    <div className="flex space-x-2">
                      {INITIAL_INPUT.map((val, idx) => {
                        const processed = stepData.stack.length > 0 || stepData.action === 'result'
                          ? idx < INITIAL_INPUT.length
                          : false;
                        const isCurrent = stepData.currentInput === val &&
                          INITIAL_INPUT.indexOf(val) === idx;

                        let findIdx = -1;
                        for (let s = 0; s < STEPS.length; s++) {
                          if (STEPS[s].currentInput === INITIAL_INPUT[idx] && s <= currentStepIdx) {
                            findIdx = idx;
                          }
                        }
                        const isProcessed = currentStepIdx > 0 && idx < Math.floor((currentStepIdx) / 3);

                        return (
                          <div
                            key={idx}
                            className={`w-10 h-10 flex items-center justify-center rounded-lg font-bold text-sm border-2 ${
                              stepData.currentInput !== null && idx === Math.floor((currentStepIdx - 1) / 3)
                                ? 'bg-yellow-100 border-yellow-400 text-yellow-800 scale-110'
                                : 'bg-slate-100 border-slate-200 text-slate-600'
                            }`}
                            style={{ transition: 'all 0.3s' }}
                          >
                            {val}
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* 스택 시각화 (세로) */}
                  <div className="flex-1 flex flex-col items-center justify-end">
                    <div className="w-32 border-l-4 border-r-4 border-b-4 border-slate-300 rounded-b-lg bg-slate-50 min-h-[200px] flex flex-col-reverse p-2 space-y-reverse space-y-1 relative">
                      {stepData.stack.length === 0 && (
                        <div className="text-slate-400 text-sm italic text-center py-8">비어있음</div>
                      )}
                      {stepData.stack.map((val, idx) => {
                        const isTop = idx === stepData.stack.length - 1;
                        const justPushed = stepData.action === 'push' && isTop;

                        return (
                          <div
                            key={idx}
                            className={`w-full h-10 flex items-center justify-center rounded font-bold text-lg ${
                              justPushed
                                ? 'bg-emerald-500 text-white shadow-lg scale-105'
                                : isTop
                                ? 'bg-blue-500 text-white'
                                : 'bg-blue-200 text-blue-900'
                            }`}
                            style={{ transition: 'all 0.3s' }}
                          >
                            {val}
                          </div>
                        );
                      })}
                      {stepData.action === 'pop' && stepData.removedItem !== null && (
                        <div className="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-10 flex items-center justify-center rounded bg-red-500 text-white font-bold text-lg opacity-70 shadow-lg">
                          {stepData.removedItem} ✕
                        </div>
                      )}
                    </div>
                    <div className="text-xs text-slate-500 mt-2 font-mono">stack (bottom → top)</div>
                  </div>

                  {/* 합계 */}
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mt-4 space-y-2">
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-600">스택 내 요소 개수</span>
                      <span className="font-bold text-slate-800">{stepData.stack.length} 개</span>
                    </div>
                    <div className="flex justify-between items-center bg-slate-800 text-white p-3 rounded-md shadow-sm">
                      <span className="font-semibold text-sm">현재 합계 <code className="bg-slate-700 px-1 text-xs rounded">sum(money)</code></span>
                      <span className="text-2xl font-bold text-emerald-400">
                        {stepData.stack.reduce((a, b) => a + b, 0)}
                      </span>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 일시정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 재생</>
                      )}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">
                    진행도: {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          data-active={isActive ? 'true' : 'false'}
                          className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}
                        >
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
