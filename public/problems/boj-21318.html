<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>누적합: 피아노 체조 - 백준 21318</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "import sys",
      "input = sys.stdin.readline",
      "",
      "N = int(input())                         # 악보 개수",
      "level = list(map(int, input().split()))  # 각 악보 난이도",
      "Q = int(input())                         # 쿼리 수",
      "",
      "arr = [0] * N                            # 실수 여부 배열",
      "for i in range(N - 1):                   # 인접 비교",
      "    if level[i] > level[i+1]:            # 난이도가 떨어지면",
      "        arr[i] = 1                        # 실수 발생 지점",
      "",
      "psum = [0] * (N+1)                       # 누적합 배열",
      "for i in range(N-1):                     # 누적합 계산",
      "    if i == 0:",
      "        psum[i] = arr[i]",
      "    else:",
      "        psum[i] = psum[i-1] + arr[i]",
      "",
      "for _ in range(Q):                       # 각 쿼리 처리",
      "    x, y = map(int, input().split())     # 구간 [x, y]",
      "    x -= 1                               # 0-indexed 변환",
      "    y -= 1",
      "",
      "    if x == y:                           # 같은 악보면 0",
      "        print(0)",
      "        continue",
      "",
      "    ans = psum[y-1]                      # y-1까지 누적합",
      "    if x > 0:",
      "        ans -= psum[x-1]                 # x-1 이전 빼기",
      "",
      "    print(ans)                           # 실수 횟수 출력"
    ];

    const LEVEL = [1, 3, 2, 5, 4, 4, 6];
    const QUERIES = [[2, 5], [1, 7], [4, 5]];

    const generateSimulationSteps = (level, queries) => {
      const N = level.length;
      const steps = [];

      steps.push({
        codeLine: 3,
        desc: `입력: 악보 난이도 = [${level.join(', ')}]`,
        phase: 'input', level, arr: null, psum: null,
        highlightIdx: null, query: null, ans: null,
        queryIdx: -1,
      });

      // arr 계산
      const arr = new Array(N).fill(0);
      steps.push({
        codeLine: 7,
        desc: `실수 배열 arr 초기화. 인접 난이도를 비교합니다.`,
        phase: 'arr', level, arr: [...arr], psum: null,
        highlightIdx: null, query: null, ans: null, queryIdx: -1,
      });

      for (let i = 0; i < N - 1; i++) {
        if (level[i] > level[i + 1]) {
          arr[i] = 1;
          steps.push({
            codeLine: 10,
            desc: `level[${i}]=${level[i]} > level[${i+1}]=${level[i+1]} → arr[${i}] = 1 (실수 발생!)`,
            phase: 'arr', level, arr: [...arr], psum: null,
            highlightIdx: i, query: null, ans: null, queryIdx: -1,
          });
        } else {
          steps.push({
            codeLine: 9,
            desc: `level[${i}]=${level[i]} ≤ level[${i+1}]=${level[i+1]} → 실수 없음`,
            phase: 'arr', level, arr: [...arr], psum: null,
            highlightIdx: i, query: null, ans: null, queryIdx: -1,
          });
        }
      }

      // psum 계산
      const psum = new Array(N + 1).fill(0);
      steps.push({
        codeLine: 12,
        desc: `누적합 배열 psum 계산 시작. arr = [${arr.join(', ')}]`,
        phase: 'psum', level, arr: [...arr], psum: [...psum],
        highlightIdx: null, query: null, ans: null, queryIdx: -1,
      });

      for (let i = 0; i < N - 1; i++) {
        psum[i] = i === 0 ? arr[i] : psum[i - 1] + arr[i];
        steps.push({
          codeLine: 14,
          desc: `psum[${i}] = ${psum[i]} (arr[${i}]=${arr[i]}${i > 0 ? ` + psum[${i-1}]=${psum[i-1]}` : ''})`,
          phase: 'psum', level, arr: [...arr], psum: [...psum],
          highlightIdx: i, query: null, ans: null, queryIdx: -1,
        });
      }

      // 쿼리 처리
      for (let qi = 0; qi < queries.length; qi++) {
        const [x1, y1] = queries[qi];
        const x = x1 - 1, y = y1 - 1;
        let ans;
        if (x === y) {
          ans = 0;
        } else {
          ans = psum[y - 1];
          if (x > 0) ans -= psum[x - 1];
        }

        steps.push({
          codeLine: 19,
          desc: `쿼리 ${qi + 1}: x=${x1}, y=${y1} → 구간 [${x1}, ${y1}]의 실수 횟수를 구합니다.`,
          phase: 'query', level, arr: [...arr], psum: [...psum],
          highlightIdx: null, query: [x, y], ans: null, queryIdx: qi,
        });

        steps.push({
          codeLine: 28,
          desc: `psum[${y-1}]=${psum[y-1]}${x > 0 ? ` - psum[${x-1}]=${psum[x-1]}` : ''} = ${ans}. 실수 횟수 = ${ans}`,
          phase: 'query', level, arr: [...arr], psum: [...psum],
          highlightIdx: null, query: [x, y], ans, queryIdx: qi,
        });
      }

      steps.push({
        codeLine: 31,
        desc: `모든 쿼리 처리 완료!`,
        phase: 'done', level, arr: [...arr], psum: [...psum],
        highlightIdx: null, query: null, ans: null, queryIdx: -1,
      });

      return steps;
    };

    const STEPS = generateSimulationSteps(LEVEL, QUERIES);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\/\/|\.)/g);
      const keywords = new Set(['import', 'from', 'for', 'in', 'if', 'else', 'range', 'continue']);
      const builtins = new Set(['int', 'input', 'list', 'map', 'print', 'max', 'min', 'len']);
      const modules = new Set(['sys', 'stdin']);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (modules.has(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!=', '>=', '<=', '+='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(prev => prev + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1200);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const activeEl = codeViewerRef.current.querySelector('[data-active="true"]');
          // if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [currentStepIdx]);

      const maxLevel = Math.max(...LEVEL);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">누적합: 피아노 체조 시각화</h1>
              <p className="text-slate-600">
                인접 악보의 난이도가 <b>감소할 때</b> 실수가 발생합니다. 실수 여부를 배열로 만든 뒤 <b>누적합(prefix sum)</b>을 계산하면,
                임의 구간 [x, y]의 실수 횟수를 O(1)에 구할 수 있습니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                {/* 악보 난이도 막대 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <h2 className="text-lg font-semibold text-slate-800 mb-4">악보 난이도 & 실수 지점</h2>
                  <div className="flex items-end justify-center gap-2 h-32 mb-4">
                    {LEVEL.map((v, i) => {
                      const isQueryRange = stepData.query && i >= stepData.query[0] && i <= stepData.query[1];
                      const isError = stepData.arr && stepData.arr[i] === 1;
                      const isHighlight = stepData.highlightIdx === i;
                      return (
                        <div key={i} className="flex flex-col items-center flex-1">
                          <div
                            className={`w-full rounded-t-md transition-all duration-300 flex items-start justify-center pt-1 ${
                              isHighlight ? 'ring-2 ring-orange-400 scale-105' :
                              isQueryRange ? 'ring-2 ring-violet-400' : ''
                            } ${isError ? 'bg-red-400' : 'bg-sky-400'}`}
                            style={{ height: `${(v / maxLevel) * 100}%` }}
                          >
                            <span className="text-white text-xs font-bold">{v}</span>
                          </div>
                          <div className="text-xs mt-1 text-slate-500">{i+1}</div>
                          {isError && <div className="text-xs text-red-500 font-bold">↓실수</div>}
                        </div>
                      );
                    })}
                  </div>
                  {/* arr & psum 테이블 */}
                  {stepData.arr && (
                    <div className="space-y-2 border-t border-slate-100 pt-3">
                      <div className="flex gap-1 items-center">
                        <span className="text-xs text-slate-500 w-16 flex-shrink-0">arr[]</span>
                        {stepData.arr.map((v, i) => (
                          <div key={i} className={`flex-1 text-center text-xs py-1 rounded font-mono font-bold border ${v === 1 ? 'bg-red-100 border-red-300 text-red-700' : 'bg-slate-50 border-slate-200 text-slate-400'}`}>{v}</div>
                        ))}
                      </div>
                      {stepData.psum && (
                        <div className="flex gap-1 items-center">
                          <span className="text-xs text-slate-500 w-16 flex-shrink-0">psum[]</span>
                          {stepData.psum.slice(0, LEVEL.length).map((v, i) => {
                            const inQuery = stepData.query && (i === stepData.query[1] - 1 || (stepData.query[0] > 0 && i === stepData.query[0] - 1));
                            return (
                              <div key={i} className={`flex-1 text-center text-xs py-1 rounded font-mono font-bold border ${inQuery ? 'bg-violet-100 border-violet-400 text-violet-700' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>{v}</div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  )}

                  {/* 쿼리 결과 */}
                  {stepData.query && (
                    <div className="mt-3 p-3 rounded-lg bg-violet-50 border border-violet-200">
                      <div className="text-sm">
                        <span className="text-violet-700 font-semibold">쿼리 [{QUERIES[stepData.queryIdx][0]}, {QUERIES[stepData.queryIdx][1]}]</span>
                        <span className="text-slate-600 ml-2">→ 실수 횟수: </span>
                        <span className="text-2xl font-bold text-violet-700 ml-1">{stepData.ans !== null ? stepData.ans : '계산 중...'}</span>
                      </div>
                    </div>
                  )}
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              {/* 코드 뷰어 */}
              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden" style={{ minHeight: '500px' }}>
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
