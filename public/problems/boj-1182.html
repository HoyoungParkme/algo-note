<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>브루트포스: 부분수열의 합 - 백준 1182</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "from itertools import combinations",
      "",
      "N, S = map(int, input().split())         # N개 원소, 목표 합 S",
      "nums = list(map(int, input().split()))   # 정수 배열",
      "",
      "cnt = 0                                  # 조건을 만족하는 부분수열 수",
      "for i in range(N):                       # 크기 1부터 N까지",
      "    tmp = list(combinations(nums, i+1))  # 크기 i+1의 모든 부분수열",
      "",
      "    for i in range(len(tmp)):            # 각 부분수열 검사",
      "        if sum(tmp[i]) == S:             # 합이 S와 같으면",
      "            cnt += 1                     # 카운트 증가",
      "",
      "print(cnt)                               # 조건 만족 개수 출력"
    ];

    const NUMS = [-1, 3, -5, 1, 5];
    const S_VAL = 0;
    const N_VAL = NUMS.length;

    function getCombinations(arr, m) {
      if (m === 1) return arr.map((v, i) => [{ v, i }]);
      const result = [];
      for (let i = 0; i <= arr.length - m; i++) {
        const rest = getCombinations(arr.slice(i + 1).map((v, j) => ({ v, i: arr.slice(i + 1)[j] !== undefined ? i + 1 + j : -1 })), m - 1);
        for (const r of rest) result.push([{ v: arr[i], i: i + (arr.length - NUMS.length) }, ...r]);
      }
      return result;
    }

    // Generate all subsets with their original indices
    function* getSubsets(nums, s) {
      for (let size = 1; size <= nums.length; size++) {
        const combos = [];
        const helper = (start, cur) => {
          if (cur.length === size) { combos.push([...cur]); return; }
          for (let i = start; i < nums.length; i++) helper(i + 1, [...cur, i]);
        };
        helper(0, []);
        for (const idxList of combos) {
          const vals = idxList.map(i => nums[i]);
          const total = vals.reduce((a, b) => a + b, 0);
          yield { idxList, vals, total, size };
        }
      }
    }

    const generateSimulationSteps = () => {
      const steps = [];
      let cnt = 0;

      steps.push({
        codeLine: 2,
        desc: `입력: nums = [${NUMS.join(', ')}], S = ${S_VAL}. 합이 ${S_VAL}인 부분수열 개수를 구합니다.`,
        selectedIndices: null, currentVals: null, currentSum: null, cnt, isMatch: false,
        currentSize: null, doneCount: 0,
      });

      steps.push({
        codeLine: 5,
        desc: `cnt = 0으로 초기화. 크기 1부터 ${N_VAL}까지 모든 부분수열을 탐색합니다.`,
        selectedIndices: null, currentVals: null, currentSum: null, cnt, isMatch: false,
        currentSize: null, doneCount: 0,
      });

      let doneCount = 0;
      for (const { idxList, vals, total, size } of getSubsets(NUMS, S_VAL)) {
        const isMatch = total === S_VAL;

        steps.push({
          codeLine: 9,
          desc: `크기 ${size} 부분수열 [${vals.join(', ')}] 검사. 합 = ${total}`,
          selectedIndices: idxList, currentVals: vals, currentSum: total, cnt, isMatch: false,
          currentSize: size, doneCount,
        });

        if (isMatch) {
          cnt++;
          steps.push({
            codeLine: 11,
            desc: `합(${total}) == S(${S_VAL}). ✅ 조건 만족! cnt = ${cnt}`,
            selectedIndices: idxList, currentVals: vals, currentSum: total, cnt, isMatch: true,
            currentSize: size, doneCount,
          });
        }
        doneCount++;
      }

      steps.push({
        codeLine: 13,
        desc: `탐색 완료! 합이 ${S_VAL}인 부분수열의 개수 = ${cnt}`,
        selectedIndices: null, currentVals: null, currentSum: null, cnt, isMatch: false,
        currentSize: null, doneCount,
      });

      return steps;
    };

    const STEPS = generateSimulationSteps();
    const TOTAL_SUBSETS = (1 << N_VAL) - 1;

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\/\/|\.)/g);
      const keywords = new Set(['from', 'import', 'for', 'in', 'if', 'range', 'list']);
      const builtins = new Set(['int', 'input', 'map', 'sum', 'len', 'print']);
      const modules = new Set(['itertools', 'combinations']);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (modules.has(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!=', '+='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    const COLORS = ['bg-violet-400', 'bg-sky-400', 'bg-emerald-400', 'bg-amber-400', 'bg-rose-400'];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(p => p + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1000);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const el = codeViewerRef.current.querySelector('[data-active="true"]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [currentStepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">브루트포스: 부분수열의 합 시각화</h1>
              <p className="text-slate-600">
                크기 1부터 N까지의 모든 <b>부분수열(subset)</b>의 합을 계산하여 목표값 S와 같은 경우의 수를 셉니다.
                공집합을 제외한 2<sup>N</sup>-1가지를 전부 탐색합니다.
              </p>
            </header>

            <div className={`text-white p-5 rounded-xl shadow-sm border transition-colors duration-300 ${stepData.isMatch ? 'bg-emerald-600 border-emerald-700' : 'bg-blue-600 border-blue-700'}`}>
              <h3 className={`text-xs font-bold mb-2 uppercase tracking-wider ${stepData.isMatch ? 'text-emerald-200' : 'text-blue-200'}`}>현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <div className="flex justify-between items-center mb-5">
                    <h2 className="text-lg font-semibold text-slate-800">배열 & 현재 부분수열</h2>
                    <div className="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-mono font-bold">
                      cnt = {stepData.cnt}
                    </div>
                  </div>

                  {/* 원소 표시 */}
                  <div className="flex gap-2 mb-5">
                    {NUMS.map((v, i) => {
                      const isSelected = stepData.selectedIndices && stepData.selectedIndices.includes(i);
                      return (
                        <div key={i} className={`flex-1 py-3 rounded-xl border-2 text-center font-bold text-lg transition-all duration-300 ${
                          isSelected
                            ? stepData.isMatch
                              ? 'bg-emerald-100 border-emerald-400 text-emerald-700 scale-110 shadow-md'
                              : 'bg-blue-100 border-blue-400 text-blue-700 scale-105 shadow-sm'
                            : 'bg-slate-50 border-slate-200 text-slate-500'
                        }`}>
                          {v >= 0 ? v : v}
                        </div>
                      );
                    })}
                  </div>

                  {/* 현재 부분수열 합 */}
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 text-center">
                      <div className="text-xs text-slate-500 mb-1">선택된 원소들의 합</div>
                      <div className={`text-2xl font-bold font-mono ${
                        stepData.currentSum === null ? 'text-slate-300' :
                        stepData.currentSum === S_VAL ? 'text-emerald-600' : 'text-slate-700'
                      }`}>
                        {stepData.currentSum !== null ? stepData.currentSum : '—'}
                      </div>
                      <div className="text-xs text-slate-400 mt-1">목표: S = {S_VAL}</div>
                    </div>
                    <div className={`p-3 rounded-lg border text-center transition-all duration-300 ${stepData.cnt > 0 ? 'bg-emerald-50 border-emerald-200' : 'bg-slate-800 border-slate-700'}`}>
                      <div className={`text-xs mb-1 ${stepData.cnt > 0 ? 'text-emerald-600' : 'text-slate-400'}`}>조건 만족 개수</div>
                      <div className={`text-2xl font-bold font-mono ${stepData.cnt > 0 ? 'text-emerald-600' : 'text-emerald-400'}`}>{stepData.cnt}</div>
                    </div>
                  </div>
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              {/* 코드 뷰어 */}
              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden" style={{ minHeight: '450px' }}>
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
