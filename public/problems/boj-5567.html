<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFS: 결혼식 - 백준 5567</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "N = int(input())                        # 전체 사람 수",
      "M = int(input())                        # 관계 수",
      "",
      "adj = [[] for _ in range(N)]            # 인접 리스트",
      "",
      "for _ in range(M):                      # 친구 관계 입력",
      "    a, b = map(int, input().split())",
      "    adj[a-1].append(b-1)               # 양방향 연결",
      "    adj[b-1].append(a-1)",
      "",
      "friend = [0] * N                        # 상근이(0)의 직접 친구",
      "for i in adj[0]:                        # 상근이 이웃 탐색",
      "    friend[i] = 1                       # 직접 친구 표시",
      "",
      "friend_friend = [0] * N                 # 친구의 친구",
      "for i in range(N):                      # 직접 친구 순회",
      "    if friend[i] == 0:                  # 친구가 아니면 스킵",
      "        continue",
      "",
      "    for j in adj[i]:                    # 친구의 이웃 탐색",
      "        if j != 0 and friend[j] == 0:   # 상근이·중복 제외",
      "            friend_friend[j] = 1         # 친구의 친구 표시",
      "",
      "print(sum(friend) + sum(friend_friend)) # 초대 인원 출력"
    ];

    // 예제: N=6, edges
    const N_NODES = 6;
    const EDGES_RAW = [[1,2],[1,3],[2,4],[3,5]]; // 1-indexed
    const EDGES = EDGES_RAW.map(([a,b]) => [a-1, b-1]);
    const ADJ = Array.from({length: N_NODES}, () => []);
    EDGES.forEach(([u,v]) => { ADJ[u].push(v); ADJ[v].push(u); });

    // 노드 위치 (상근이=0이 중앙)
    const NODE_POS = [
      {x: 200, y: 130}, // 0 상근이
      {x: 100, y: 70},  // 1
      {x: 300, y: 70},  // 2
      {x: 80,  y: 190}, // 3
      {x: 320, y: 190}, // 4
      {x: 200, y: 260}, // 5 독립
    ];

    const generateSimulationSteps = () => {
      const steps = [];
      const friend = new Array(N_NODES).fill(0);
      const ff = new Array(N_NODES).fill(0);

      steps.push({
        codeLine: 0,
        desc: `N=${N_NODES}, M=${EDGES.length}. 상근이(노드 1)의 친구와 친구의 친구를 모두 초대합니다.`,
        friend: [...friend], ff: [...ff], currentNode: null, checking: null, phase: 'init',
      });

      // 직접 친구
      steps.push({
        codeLine: 10,
        desc: `상근이(노드 1)의 직접 친구를 찾습니다. adj[0] = [${ADJ[0].map(v=>v+1).join(', ')}]`,
        friend: [...friend], ff: [...ff], currentNode: 0, checking: null, phase: 'friend',
      });

      for (const i of ADJ[0]) {
        friend[i] = 1;
        steps.push({
          codeLine: 12,
          desc: `노드 ${i+1}은 상근이의 직접 친구입니다. friend[${i+1}] = 1`,
          friend: [...friend], ff: [...ff], currentNode: 0, checking: i, phase: 'friend',
        });
      }

      // 친구의 친구
      steps.push({
        codeLine: 14,
        desc: `이제 각 친구의 이웃을 탐색하여 "친구의 친구"를 찾습니다.`,
        friend: [...friend], ff: [...ff], currentNode: null, checking: null, phase: 'ff',
      });

      for (let i = 0; i < N_NODES; i++) {
        if (friend[i] === 0) continue;

        steps.push({
          codeLine: 19,
          desc: `친구 노드 ${i+1}의 이웃을 탐색합니다.`,
          friend: [...friend], ff: [...ff], currentNode: i, checking: null, phase: 'ff',
        });

        for (const j of ADJ[i]) {
          steps.push({
            codeLine: 20,
            desc: `${j === 0 ? `노드 ${j+1}은 상근이 본인 → 스킵` : friend[j] === 1 ? `노드 ${j+1}은 이미 직접 친구 → 스킵` : `노드 ${j+1}은 친구의 친구!`}`,
            friend: [...friend], ff: [...ff], currentNode: i, checking: j, phase: 'ff',
          });
          if (j !== 0 && friend[j] === 0) {
            ff[j] = 1;
            steps.push({
              codeLine: 21,
              desc: `노드 ${j+1}을 "친구의 친구"로 등록. friend_friend[${j+1}] = 1`,
              friend: [...friend], ff: [...ff], currentNode: i, checking: j, phase: 'ff',
            });
          }
        }
      }

      const total = friend.reduce((a,b) => a+b, 0) + ff.reduce((a,b) => a+b, 0);
      steps.push({
        codeLine: 23,
        desc: `초대 완료! 직접 친구 ${friend.reduce((a,b)=>a+b,0)}명 + 친구의 친구 ${ff.reduce((a,b)=>a+b,0)}명 = 총 ${total}명`,
        friend: [...friend], ff: [...ff], currentNode: null, checking: null, phase: 'done',
      });

      return steps;
    };

    const STEPS = generateSimulationSteps();

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\.)/g);
      const keywords = new Set(['for', 'in', 'if', 'continue', 'range', 'not', 'and']);
      const builtins = new Set(['int', 'input', 'map', 'print', 'sum', 'range']);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!=', '!='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(p => p + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1000);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const el = codeViewerRef.current.querySelector('[data-active="true"]');
          // removed scroll
        }
      }, [currentStepIdx]);

      const getNodeStyle = (i) => {
        const isCurrent = stepData.currentNode === i;
        const isChecking = stepData.checking === i;
        const isFriend = stepData.friend[i] === 1;
        const isFF = stepData.ff[i] === 1;
        const isSangGeun = i === 0;

        if (isSangGeun) return { fill: '#7c3aed', stroke: '#c4b5fd', text: 'white', label: '상근' };
        if (isCurrent) return { fill: '#2563eb', stroke: '#93c5fd', text: 'white', label: null };
        if (isChecking) return { fill: '#f97316', stroke: '#fed7aa', text: 'white', label: null };
        if (isFriend) return { fill: '#0ea5e9', stroke: '#7dd3fc', text: 'white', label: null };
        if (isFF) return { fill: '#10b981', stroke: '#6ee7b7', text: 'white', label: null };
        return { fill: '#e2e8f0', stroke: '#94a3b8', text: '#64748b', label: null };
      };

      const totalFriend = stepData.friend.reduce((a,b)=>a+b,0);
      const totalFF = stepData.ff.reduce((a,b)=>a+b,0);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">그래프: 결혼식 초대 시각화</h1>
              <p className="text-slate-600">
                상근이의 <b>직접 친구(1-hop)</b>와 <b>친구의 친구(2-hop)</b>를 모두 찾아 초대 인원을 계산합니다.
                단, 중복과 상근이 본인은 제외합니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-lg font-semibold text-slate-800">초대 그래프</h2>
                    <div className="flex gap-2 text-xs">
                      <span className="px-2 py-1 bg-sky-100 text-sky-700 rounded">직접 친구: {totalFriend}명</span>
                      <span className="px-2 py-1 bg-emerald-100 text-emerald-700 rounded">친구의 친구: {totalFF}명</span>
                    </div>
                  </div>

                  <div className="flex justify-center mb-4">
                    <svg width="400" height="300" className="rounded-lg bg-slate-50 border border-slate-200">
                      {EDGES.map(([u,v], ei) => (
                        <line key={ei} x1={NODE_POS[u].x} y1={NODE_POS[u].y} x2={NODE_POS[v].x} y2={NODE_POS[v].y} stroke="#cbd5e1" strokeWidth="2"/>
                      ))}
                      {Array.from({length: N_NODES}, (_, i) => {
                        const s = getNodeStyle(i);
                        const pos = NODE_POS[i];
                        return (
                          <g key={i}>
                            <circle cx={pos.x} cy={pos.y} r="24" fill={s.fill} stroke={s.stroke} strokeWidth="2.5" style={{ transition: 'fill 0.3s' }}/>
                            <text x={pos.x} y={s.label ? pos.y - 4 : pos.y + 1} textAnchor="middle" dominantBaseline="middle" fill={s.text} fontWeight="bold" fontSize="13">{i+1}</text>
                            {s.label && <text x={pos.x} y={pos.y + 8} textAnchor="middle" fill={s.text} fontSize="9">{s.label}</text>}
                          </g>
                        );
                      })}
                    </svg>
                  </div>

                  {/* 범례 */}
                  <div className="flex flex-wrap gap-3 text-xs text-slate-600 border-t border-slate-100 pt-3">
                    <div className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-violet-600 inline-block"/>상근이</div>
                    <div className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-blue-600 inline-block"/>현재 탐색</div>
                    <div className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-orange-400 inline-block"/>확인 중</div>
                    <div className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-sky-500 inline-block"/>직접 친구</div>
                    <div className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-emerald-500 inline-block"/>친구의 친구</div>
                  </div>

                  {/* 초대 합계 */}
                  <div className="mt-4 p-3 bg-slate-800 rounded-lg flex justify-between items-center">
                    <span className="text-slate-300 text-sm">총 초대 인원</span>
                    <span className="text-2xl font-bold text-emerald-400">{totalFriend + totalFF}명</span>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden" style={{ minHeight: '500px' }}>
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
