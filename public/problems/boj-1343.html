<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문자열 그리디: 폴리오미노 - 백준 1343</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "N = input()                              # 입력 문자열 (X와 .으로 구성)",
      "",
      "tmp = \"\"                                # 결과 문자열",
      "cnt = 0                                  # 연속된 X의 개수",
      "flag = False                             # 불가능 여부",
      "",
      "for i in range(len(N)):                  # 문자를 하나씩 처리",
      "    if N[i] == 'X':                      # X이면 카운트 증가",
      "        cnt += 1",
      "        if cnt == 4:                     # 4개 모이면 AAAA로 교체",
      "            tmp += 'AAAA'",
      "            cnt = 0",
      "    else:                                # '.'이면",
      "        if cnt == 1 or cnt == 3:         # X가 1개 or 3개면 불가",
      "            flag = True",
      "            break",
      "        elif cnt == 2:                   # X가 2개이면 BB로 교체",
      "            tmp += 'BB'",
      "            cnt = 0",
      "",
      "        tmp += '.'                       # '.' 추가",
      "        cnt = 0                          # 카운트 초기화",
      "",
      "if cnt == 1 or cnt == 3:                # 끝에 남은 X 검사",
      "    flag = True",
      "elif cnt == 2:                           # 남은 X 2개면 BB 추가",
      "    tmp += 'BB'",
      "",
      "if flag:                                 # 불가능하면 -1 출력",
      "    print(-1)",
      "else:",
      "    print(tmp)                           # 결과 출력"
    ];

    const INPUT_STR = "XXXXXX.XX.X";

    const generateSimulationSteps = (s) => {
      const steps = [];
      let tmp = "", cnt = 0, flag = false;

      steps.push({
        codeLine: 0,
        desc: `입력: "${s}". X를 4개(AAAA) 또는 2개(BB) 단위로 그리디하게 채웁니다.`,
        tmp, cnt, flag, currentIdx: -1, currentChar: null,
      });

      steps.push({
        codeLine: 2,
        desc: `결과 문자열 tmp="", 연속 X 카운트 cnt=0으로 초기화합니다.`,
        tmp, cnt, flag, currentIdx: -1, currentChar: null,
      });

      for (let i = 0; i < s.length && !flag; i++) {
        const ch = s[i];
        steps.push({
          codeLine: 6,
          desc: `인덱스 ${i}: 문자 '${ch}' 처리 중`,
          tmp, cnt, flag, currentIdx: i, currentChar: ch,
        });

        if (ch === 'X') {
          cnt++;
          steps.push({
            codeLine: 8,
            desc: `'X' 발견 → cnt = ${cnt}`,
            tmp, cnt, flag, currentIdx: i, currentChar: ch,
          });

          if (cnt === 4) {
            tmp += 'AAAA';
            cnt = 0;
            steps.push({
              codeLine: 10,
              desc: `cnt=4 → 'AAAA' 추가! cnt=0으로 초기화. tmp="${tmp}"`,
              tmp, cnt, flag, currentIdx: i, currentChar: ch,
            });
          }
        } else {
          if (cnt === 1 || cnt === 3) {
            flag = true;
            steps.push({
              codeLine: 14,
              desc: `'.' 발견인데 cnt=${cnt} (홀수 X) → 채울 수 없음! flag=True`,
              tmp, cnt, flag, currentIdx: i, currentChar: ch,
            });
            break;
          } else if (cnt === 2) {
            tmp += 'BB';
            cnt = 0;
            steps.push({
              codeLine: 17,
              desc: `'.' 전에 cnt=2 → 'BB' 추가! cnt=0. tmp="${tmp}"`,
              tmp, cnt, flag, currentIdx: i, currentChar: ch,
            });
          }
          tmp += '.';
          cnt = 0;
          steps.push({
            codeLine: 20,
            desc: `'.' 추가. tmp="${tmp}"`,
            tmp, cnt, flag, currentIdx: i, currentChar: ch,
          });
        }
      }

      if (!flag) {
        if (cnt === 1 || cnt === 3) {
          flag = true;
          steps.push({
            codeLine: 23,
            desc: `끝에 cnt=${cnt}개의 X가 남음 → 불가능! flag=True`,
            tmp, cnt, flag, currentIdx: s.length, currentChar: null,
          });
        } else if (cnt === 2) {
          tmp += 'BB';
          steps.push({
            codeLine: 26,
            desc: `끝에 cnt=2개의 X → 'BB' 추가. tmp="${tmp}"`,
            tmp, cnt, flag, currentIdx: s.length, currentChar: null,
          });
        }
      }

      steps.push({
        codeLine: flag ? 29 : 31,
        desc: flag ? `결과: -1 (불가능)` : `결과: "${tmp}"`,
        tmp, cnt, flag, currentIdx: s.length, currentChar: null,
      });

      return steps;
    };

    const STEPS = generateSimulationSteps(INPUT_STR);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\/\/|\.)/g);
      const keywords = new Set(['for', 'in', 'if', 'elif', 'else', 'break', 'range', 'len']);
      const builtins = new Set(['input', 'print']);
      const strLiterals = new Set(["'X'", "'.'", "'AAAA'", "'BB'", "\"\"", "(-1)"]);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!=', '+='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        if (token.startsWith("'") || token.startsWith('"')) return <span key={i} className="text-yellow-300">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    const CHAR_COLORS = {
      'X': 'bg-slate-600 text-white border-slate-400',
      '.': 'bg-slate-100 text-slate-400 border-slate-200',
    };
    const RESULT_COLORS = {
      'A': 'bg-violet-500 text-white',
      'B': 'bg-sky-500 text-white',
      '.': 'bg-slate-100 text-slate-400',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(p => p + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1000);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const el = codeViewerRef.current.querySelector('[data-active="true"]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [currentStepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">문자열 그리디: 폴리오미노 시각화</h1>
              <p className="text-slate-600">
                연속된 <b>X</b>를 4개 단위로 <code className="bg-slate-100 px-1 rounded">AAAA</code>로, 2개 단위로 <code className="bg-slate-100 px-1 rounded">BB</code>로 그리디하게 교체합니다.
                홀수(1개 또는 3개)의 X가 남으면 <b>-1</b>을 출력합니다.
              </p>
            </header>

            <div className={`text-white p-5 rounded-xl shadow-sm border transition-colors duration-300 ${stepData.flag ? 'bg-red-600 border-red-700' : 'bg-blue-600 border-blue-700'}`}>
              <h3 className={`text-xs font-bold mb-2 uppercase tracking-wider ${stepData.flag ? 'text-red-200' : 'text-blue-200'}`}>현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <h2 className="text-lg font-semibold text-slate-800 mb-4">문자열 처리 현황</h2>

                  {/* 입력 문자열 */}
                  <div className="mb-5">
                    <div className="text-xs text-slate-500 mb-2">입력 문자열</div>
                    <div className="flex gap-1 flex-wrap">
                      {INPUT_STR.split('').map((ch, i) => {
                        const isCurrent = stepData.currentIdx === i;
                        const isDone = stepData.currentIdx > i;
                        return (
                          <div key={i} className={`w-8 h-8 flex items-center justify-center rounded border-2 font-mono font-bold text-sm transition-all duration-300 ${
                            isCurrent ? 'ring-2 ring-orange-400 scale-125 bg-orange-100 border-orange-400 text-orange-700' :
                            isDone ? 'opacity-40 ' + CHAR_COLORS[ch] :
                            CHAR_COLORS[ch]
                          }`}>{ch}</div>
                        );
                      })}
                    </div>
                  </div>

                  {/* 현재 X 카운트 */}
                  <div className="flex gap-3 mb-5">
                    <div className="flex-1 bg-slate-50 p-3 rounded-lg border border-slate-200 text-center">
                      <div className="text-xs text-slate-500 mb-1">연속 X 카운트</div>
                      <div className="text-3xl font-bold font-mono text-slate-700">{stepData.cnt}</div>
                    </div>
                    <div className={`flex-1 p-3 rounded-lg border text-center ${stepData.flag ? 'bg-red-50 border-red-200' : 'bg-slate-800 border-slate-700'}`}>
                      <div className={`text-xs mb-1 ${stepData.flag ? 'text-red-600' : 'text-slate-400'}`}>상태</div>
                      <div className={`text-sm font-bold ${stepData.flag ? 'text-red-600' : 'text-emerald-400'}`}>{stepData.flag ? '❌ 불가능' : '✅ 진행 중'}</div>
                    </div>
                  </div>

                  {/* 결과 문자열 빌드 */}
                  <div>
                    <div className="text-xs text-slate-500 mb-2">결과 문자열 (tmp)</div>
                    <div className="flex gap-1 flex-wrap min-h-[40px] p-2 bg-slate-50 border border-slate-200 rounded-lg">
                      {stepData.tmp === '' && <span className="text-slate-300 text-xs italic">아직 비어있음</span>}
                      {stepData.tmp.split('').map((ch, i) => (
                        <div key={i} className={`w-7 h-7 flex items-center justify-center rounded font-mono font-bold text-xs ${RESULT_COLORS[ch] || 'bg-slate-200 text-slate-600'}`}>{ch}</div>
                      ))}
                    </div>
                    <div className="mt-2 text-xs text-slate-400">
                      <span className="inline-block w-4 h-4 bg-violet-500 rounded mr-1 align-middle" />AAAA (4-폴리오미노)
                      <span className="inline-block w-4 h-4 bg-sky-500 rounded mr-1 ml-3 align-middle" />BB (2-폴리오미노)
                    </div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden" style={{ minHeight: '500px' }}>
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
