<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>백트래킹: N과 M (2) - 백준 15650</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "from itertools import combinations",
      "",
      "N, M = list(map(int, input().split())) # N개 중 M개 오름차순 조합",
      "",
      "nums = [i for i in range(1, N+1)]      # 1부터 N까지의 숫자 목록",
      "",
      "for i in list(combinations(nums, M)):  # 모든 조합(순서 없음) 탐색",
      "    print(*i)                           # 각 조합 출력 (오름차순 보장)"
    ];

    // 예제: N=4, M=2
    const N_VAL = 4, M_VAL = 2;

    function getCombinations(arr, m) {
      if (m === 1) return arr.map(v => [v]);
      const result = [];
      for (let i = 0; i <= arr.length - m; i++) {
        const rest = getCombinations(arr.slice(i + 1), m - 1);
        for (const r of rest) result.push([arr[i], ...r]);
      }
      return result;
    }

    const nums = Array.from({ length: N_VAL }, (_, i) => i + 1);
    const allCombinations = getCombinations(nums, M_VAL);

    const generateSimulationSteps = () => {
      const steps = [];

      steps.push({
        codeLine: 2,
        desc: `N=${N_VAL}, M=${M_VAL}. ${N_VAL}개 숫자에서 ${M_VAL}개를 고르는 모든 오름차순 조합을 출력합니다.`,
        currentCombo: null, doneCount: 0, highlighted: null,
      });

      steps.push({
        codeLine: 4,
        desc: `nums = [${nums.join(', ')}]. 1부터 N까지의 숫자 목록을 생성합니다.`,
        currentCombo: null, doneCount: 0, highlighted: null,
      });

      steps.push({
        codeLine: 6,
        desc: `combinations(nums, ${M_VAL})로 총 ${allCombinations.length}개의 조합을 생성합니다.`,
        currentCombo: null, doneCount: 0, highlighted: null,
      });

      for (let i = 0; i < allCombinations.length; i++) {
        const combo = allCombinations[i];
        steps.push({
          codeLine: 6,
          desc: `조합 #${i + 1} 선택: [${combo.join(', ')}]`,
          currentCombo: combo, doneCount: i, highlighted: combo,
        });
        steps.push({
          codeLine: 7,
          desc: `출력: ${combo.join(' ')}`,
          currentCombo: combo, doneCount: i + 1, highlighted: combo,
        });
      }

      steps.push({
        codeLine: 7,
        desc: `완료! 총 ${allCombinations.length}개의 조합을 모두 출력했습니다.`,
        currentCombo: null, doneCount: allCombinations.length, highlighted: null,
      });

      return steps;
    };

    const STEPS = generateSimulationSteps();

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\/\/|\.)/g);
      const keywords = new Set(['from', 'import', 'for', 'in', 'list', 'range', 'if']);
      const builtins = new Set(['int', 'input', 'map', 'print']);
      const modules = new Set(['itertools', 'combinations']);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (modules.has(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(p => p + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 900);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const el = codeViewerRef.current.querySelector('[data-active="true"]');
          // removed scroll
        }
      }, [currentStepIdx]);

      // 숫자 버튼 색상 맵
      const COLORS = ['bg-violet-400', 'bg-sky-400', 'bg-emerald-400', 'bg-amber-400'];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">백트래킹: N과 M (2) 시각화</h1>
              <p className="text-slate-600">
                1부터 N까지의 자연수 중 M개를 골라 <b>오름차순</b>으로 나열하는 모든 조합을 출력합니다.
                순열(permutation)과 달리 조합(combination)은 순서가 없어 <code className="bg-slate-100 px-1 rounded text-sm">C(N, M)</code>가지만 생성됩니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                {/* 숫자 선택 시각화 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-lg font-semibold text-slate-800">숫자 선택 현황</h2>
                    <span className="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded font-mono">
                      {stepData.doneCount} / {allCombinations.length} 완료
                    </span>
                  </div>

                  {/* 진행률 */}
                  <div className="w-full bg-slate-100 rounded-full h-2 mb-5">
                    <div className="bg-blue-500 h-2 rounded-full transition-all duration-500"
                      style={{ width: `${(stepData.doneCount / allCombinations.length) * 100}%` }} />
                  </div>

                  {/* 현재 선택된 조합 */}
                  <div className="mb-5">
                    <div className="text-xs text-slate-500 mb-2">현재 선택된 조합</div>
                    <div className="flex gap-3 min-h-[56px] items-center">
                      {stepData.currentCombo ? stepData.currentCombo.map((v, i) => (
                        <div key={i} className={`w-12 h-12 rounded-xl flex items-center justify-center text-white text-lg font-bold shadow-md ${COLORS[(v - 1) % 4]}`}>{v}</div>
                      )) : (
                        <span className="text-slate-300 text-sm italic">조합 선택 중...</span>
                      )}
                    </div>
                  </div>

                  {/* 전체 조합 그리드 */}
                  <div className="border-t border-slate-100 pt-4">
                    <div className="text-xs text-slate-500 mb-2">전체 조합 목록</div>
                    <div className="grid grid-cols-3 gap-2">
                      {allCombinations.map((combo, ci) => {
                        const isDone = ci < stepData.doneCount;
                        const isCurrent = stepData.currentCombo && combo.join(',') === stepData.currentCombo.join(',');
                        return (
                          <div key={ci} className={`px-3 py-2 rounded-lg border text-sm font-mono text-center transition-all duration-300 ${
                            isCurrent ? 'bg-blue-100 border-blue-400 text-blue-800 font-bold scale-105' :
                            isDone ? 'bg-emerald-50 border-emerald-200 text-emerald-700' :
                            'bg-slate-50 border-slate-200 text-slate-400'
                          }`}>
                            {combo.join(' ')}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              {/* 코드 뷰어 */}
              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden" style={{ minHeight: '400px' }}>
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
