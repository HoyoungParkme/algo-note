<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>투 포인터: 배열 합치기 - 백준 11728</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "from collections import deque",
      "",
      "n, m = map(int, input().split())",
      "a = deque(sorted(map(int, input().split())))",
      "b = deque(sorted(map(int, input().split())))",
      "",
      "answer = []",
      "",
      "# 두 배열의 앞쪽을 비교하며 작은 값부터 추가",
      "while len(a) > 0 and len(b) > 0:",
      "    if a[0] < b[0]:",
      "        answer.append(a.popleft())",
      "    else:",
      "        answer.append(b.popleft())",
      "",
      "# 남은 원소 추가",
      "if len(a) > 0:",
      "    for i in a: answer.append(i)",
      "else:",
      "    for i in b: answer.append(i)",
      "",
      "print(*answer)"
    ];

    const INITIAL_A = [1, 3, 5, 7];
    const INITIAL_B = [2, 4, 6, 8];

    const generateSimulationSteps = (initA, initB) => {
      const steps = [];
      const a = [...initA], b = [...initB];
      const result = [];
      let ptrA = 0, ptrB = 0;

      steps.push({ codeLine: 3, desc: `정렬된 두 배열 A=[${a.join(', ')}], B=[${b.join(', ')}]을 합칩니다.`, arrA: [...initA], arrB: [...initB], ptrA: 0, ptrB: 0, result: [], action: null });

      while (ptrA < initA.length && ptrB < initB.length) {
        steps.push({ codeLine: 9, desc: `A[${ptrA}]=${initA[ptrA]}과 B[${ptrB}]=${initB[ptrB]}을 비교합니다.`, arrA: [...initA], arrB: [...initB], ptrA, ptrB, result: [...result], action: 'compare' });

        if (initA[ptrA] < initB[ptrB]) {
          result.push(initA[ptrA]);
          steps.push({ codeLine: 11, desc: `A[${ptrA}]=${initA[ptrA]}이 더 작으므로 결과에 추가합니다.`, arrA: [...initA], arrB: [...initB], ptrA: ptrA + 1, ptrB, result: [...result], action: 'pickA' });
          ptrA++;
        } else {
          result.push(initB[ptrB]);
          steps.push({ codeLine: 13, desc: `B[${ptrB}]=${initB[ptrB]}이 더 작거나 같으므로 결과에 추가합니다.`, arrA: [...initA], arrB: [...initB], ptrA, ptrB: ptrB + 1, result: [...result], action: 'pickB' });
          ptrB++;
        }
      }

      while (ptrA < initA.length) {
        result.push(initA[ptrA]);
        ptrA++;
      }
      while (ptrB < initB.length) {
        result.push(initB[ptrB]);
        ptrB++;
      }

      steps.push({ codeLine: 16, desc: `남은 원소를 모두 추가합니다. 최종 결과: [${result.join(', ')}]`, arrA: [...initA], arrB: [...initB], ptrA, ptrB, result: [...result], action: 'done' });
      return steps;
    };

    const STEPS = generateSimulationSteps(INITIAL_A, INITIAL_B);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|\.)/g);
      const keywords = new Set(['from', 'import', 'while', 'if', 'else', 'for', 'in', 'and']);
      const builtins = new Set(['int', 'input', 'map', 'sorted', 'len', 'print']);
      const methods = new Set(['split', 'append', 'popleft']);
      const modules = new Set(['collections', 'deque']);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (methods.has(token)) return <span key={i} className="text-yellow-200">{token}</span>;
        if (modules.has(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=','+','-','<','>','==','!=','*'].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;
      const handleNext = useCallback(() => { if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(p => p+1); else setIsPlaying(false); }, [currentStepIdx]);
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p-1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };
      useEffect(() => { if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1000); else clearInterval(playIntervalRef.current); return () => clearInterval(playIntervalRef.current); }, [isPlaying, handleNext]);
      useEffect(() => { if (codeViewerRef.current && stepData.codeLine !== null) { const el = codeViewerRef.current.querySelector('[data-active="true"]'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); } }, [currentStepIdx]);

      const renderArr = (arr, ptr, label, color) => (
        <div className="mb-4">
          <h3 className="text-sm font-semibold text-slate-700 mb-2">{label}</h3>
          <div className="flex space-x-1">
            {arr.map((v, i) => {
              const isPast = i < ptr;
              const isCurrent = i === ptr;
              return (
                <div key={i} className={`w-10 h-10 flex items-center justify-center rounded font-bold text-sm border-2 ${
                  isPast ? 'bg-slate-100 border-slate-200 text-slate-300 line-through' :
                  isCurrent ? `${color} text-white scale-110 shadow-lg` :
                  'bg-white border-slate-200 text-slate-700'
                }`} style={{ transition: 'all 0.3s' }}>{v}</div>
              );
            })}
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">투 포인터: 배열 합치기 시각화</h1>
              <p className="text-slate-600">정렬된 두 배열을 하나의 정렬된 배열로 합칩니다. 각 배열의 <b>앞쪽 포인터</b>를 비교하여 작은 값을 먼저 결과에 추가합니다. 머지 소트의 병합 단계와 동일합니다.</p>
            </header>
            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700 flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-lg font-semibold text-slate-800">배열 상태</h2>
                    <div className="flex space-x-3 text-xs text-slate-500">
                      <div className="flex items-center"><span className="w-3 h-3 bg-blue-500 rounded-sm mr-1"></span> A 포인터</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-emerald-500 rounded-sm mr-1"></span> B 포인터</div>
                    </div>
                  </div>
                  {renderArr(stepData.arrA, stepData.ptrA, 'A 배열', 'bg-blue-500 border-blue-700')}
                  {renderArr(stepData.arrB, stepData.ptrB, 'B 배열', 'bg-emerald-500 border-emerald-700')}

                  <div className="mt-4 pt-4 border-t border-slate-100">
                    <h3 className="text-sm font-semibold text-slate-700 mb-2">결과 배열</h3>
                    <div className="flex space-x-1 p-2 bg-slate-50 border border-slate-200 rounded-lg min-h-[44px] items-center">
                      {stepData.result.length === 0 && <span className="text-slate-400 text-sm italic">비어있음</span>}
                      {stepData.result.map((v, i) => (
                        <div key={i} className="w-10 h-10 flex items-center justify-center rounded bg-indigo-100 border-2 border-indigo-300 text-indigo-800 font-bold text-sm">{v}</div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mt-4">
                    <div className="flex justify-between items-center bg-slate-800 text-white p-3 rounded-md shadow-sm">
                      <span className="font-semibold text-sm">결과 크기</span>
                      <span className="text-2xl font-bold text-emerald-400">{stepData.result.length} / {INITIAL_A.length + INITIAL_B.length}</span>
                    </div>
                  </div>
                </div>
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>
              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (<div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}><span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span></div>);
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
