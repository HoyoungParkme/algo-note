<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스택: 균형잡힌 세상 - 백준 4949</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "flag = True",
      "left = []",
      "",
      "for j in tmp:",
      "    # 닫는 괄호인데 스택이 비어있으면 실패",
      "    if j in [']', ')'] and len(left) == 0:",
      "        flag = False",
      "        break",
      "",
      "    if j == ']':",
      "        if left[-1] == '[':",
      "            left.pop()  # 짝이 맞으면 제거",
      "        else:",
      "            flag = False",
      "            break",
      "",
      "    elif j == ')':",
      "        if left[-1] == '(':",
      "            left.pop()  # 짝이 맞으면 제거",
      "        else:",
      "            flag = False",
      "            break",
      "",
      "    elif j in ['[', '(']:",
      "        left.append(j)  # 여는 괄호는 스택에 push",
      "",
      "# 스택이 비어있고 flag가 True이면 균형",
      "if flag and len(left) == 0:",
      "    print('yes')",
      "else:",
      "    print('no')"
    ];

    const INITIAL_STRING = "So when I die (the [first] I will see in (heaven) is a score list).";

    const generateSimulationSteps = (str) => {
      const steps = [];
      const left = [];
      let flag = true;

      steps.push({
        codeLine: 0,
        desc: `문자열을 검사합니다: "${str.length > 40 ? str.slice(0, 40) + '...' : str}"`,
        stack: [...left],
        charIndex: -1,
        currentChar: null,
        chars: [...str],
        result: null
      });

      steps.push({
        codeLine: 1,
        desc: "빈 스택을 초기화합니다. 여는 괄호를 만나면 push, 닫는 괄호를 만나면 짝을 확인하고 pop합니다.",
        stack: [...left],
        charIndex: -1,
        currentChar: null,
        chars: [...str],
        result: null
      });

      for (let i = 0; i < str.length; i++) {
        const j = str[i];

        if (!'[]()'.includes(j)) continue;

        steps.push({
          codeLine: 3,
          desc: `문자 '${j}' (위치 ${i})을(를) 검사합니다.`,
          stack: [...left],
          charIndex: i,
          currentChar: j,
          chars: [...str],
          result: null
        });

        if ((j === ']' || j === ')') && left.length === 0) {
          flag = false;
          steps.push({
            codeLine: 5,
            desc: `닫는 괄호 '${j}'를 만났지만 스택이 비어있습니다. 짝이 없으므로 실패!`,
            stack: [...left],
            charIndex: i,
            currentChar: j,
            chars: [...str],
            result: 'no'
          });
          break;
        }

        if (j === ']') {
          if (left[left.length - 1] === '[') {
            left.pop();
            steps.push({
              codeLine: 11,
              desc: `']'와 스택 꼭대기의 '['가 짝이 맞습니다. pop하여 제거합니다.`,
              stack: [...left],
              charIndex: i,
              currentChar: j,
              chars: [...str],
              result: null
            });
          } else {
            flag = false;
            steps.push({
              codeLine: 13,
              desc: `']'와 스택 꼭대기의 '${left[left.length - 1]}'가 짝이 맞지 않습니다. 실패!`,
              stack: [...left],
              charIndex: i,
              currentChar: j,
              chars: [...str],
              result: 'no'
            });
            break;
          }
        } else if (j === ')') {
          if (left[left.length - 1] === '(') {
            left.pop();
            steps.push({
              codeLine: 18,
              desc: `')'와 스택 꼭대기의 '('가 짝이 맞습니다. pop하여 제거합니다.`,
              stack: [...left],
              charIndex: i,
              currentChar: j,
              chars: [...str],
              result: null
            });
          } else {
            flag = false;
            steps.push({
              codeLine: 20,
              desc: `')'와 스택 꼭대기의 '${left[left.length - 1]}'가 짝이 맞지 않습니다. 실패!`,
              stack: [...left],
              charIndex: i,
              currentChar: j,
              chars: [...str],
              result: 'no'
            });
            break;
          }
        } else if (j === '[' || j === '(') {
          left.push(j);
          steps.push({
            codeLine: 24,
            desc: `여는 괄호 '${j}'를 스택에 push합니다.`,
            stack: [...left],
            charIndex: i,
            currentChar: j,
            chars: [...str],
            result: null
          });
        }
      }

      if (flag && left.length === 0) {
        steps.push({
          codeLine: 27,
          desc: `모든 문자 검사 완료. 스택이 비어있고 오류 없음 → "yes" (균형잡힌 문자열)`,
          stack: [...left],
          charIndex: -1,
          currentChar: null,
          chars: [...str],
          result: 'yes'
        });
      } else {
        steps.push({
          codeLine: 29,
          desc: `검사 완료. ${left.length > 0 ? `스택에 '${left.join("', '")}'가 남아있음` : '짝이 맞지 않는 괄호 발견'} → "no"`,
          stack: [...left],
          charIndex: -1,
          currentChar: null,
          chars: [...str],
          result: 'no'
        });
      }

      return steps;
    };

    const STEPS = generateSimulationSteps(INITIAL_STRING);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\.)/g);

      const keywords = new Set(['for', 'in', 'if', 'elif', 'else', 'and', 'break']);
      const builtins = new Set(['len', 'print']);
      const methods = new Set(['pop', 'append']);
      const constants = new Set(['True', 'False']);

      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (methods.has(token)) return <span key={i} className="text-yellow-200">{token}</span>;
        if (constants.has(token)) return <span key={i} className="text-purple-400">{token}</span>;
        if (/^['"]/.test(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) {
          setCurrentStepIdx(prev => prev + 1);
        } else {
          setIsPlaying(false);
        }
      }, [currentStepIdx]);

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const handleReset = () => {
        setCurrentStepIdx(0);
        setIsPlaying(false);
      };

      const togglePlay = () => {
        if (isEnd) handleReset();
        setIsPlaying(!isPlaying);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(handleNext, 1000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current && stepData.codeLine !== null) {
          const activeEl = codeViewerRef.current.querySelector('[data-active="true"]');
          if (activeEl) {
          // activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }, [currentStepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">스택: 균형잡힌 세상 시각화</h1>
              <p className="text-slate-600">
                문자열에서 괄호 <b>( ), [ ]</b>가 올바르게 짝지어져 있는지 확인합니다.
                여는 괄호는 스택에 push하고, 닫는 괄호를 만나면 스택 꼭대기와 비교하여 짝이 맞으면 pop합니다.
                모든 문자를 처리한 후 스택이 비어있으면 균형잡힌 문자열입니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700 flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              <div className="flex flex-col space-y-6">

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg font-semibold text-slate-800">괄호 스택 상태</h2>
                    <div className="flex space-x-3 text-xs text-slate-500">
                      <div className="flex items-center"><span className="w-3 h-3 bg-blue-500 rounded-sm mr-1"></span> 스택 요소</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-yellow-400 rounded-sm mr-1"></span> 현재 검사중</div>
                    </div>
                  </div>

                  {/* 문자열 스캔 시각화 */}
                  <div className="mb-4">
                    <h3 className="text-sm font-semibold text-slate-700 mb-2">문자열</h3>
                    <div className="flex flex-wrap gap-0.5 p-2 bg-slate-50 border border-slate-200 rounded-lg max-h-24 overflow-y-auto">
                      {stepData.chars.map((ch, idx) => {
                        const isBracket = '[]()'.includes(ch);
                        const isCurrent = stepData.charIndex === idx;

                        return (
                          <span
                            key={idx}
                            className={`inline-block text-sm font-mono px-0.5 rounded ${
                              isCurrent
                                ? 'bg-yellow-300 text-yellow-900 font-bold scale-125 ring-2 ring-yellow-400'
                                : isBracket
                                ? 'bg-blue-100 text-blue-800 font-semibold'
                                : 'text-slate-500'
                            }`}
                            style={{ transition: 'all 0.3s' }}
                          >
                            {ch === ' ' ? '\u00A0' : ch}
                          </span>
                        );
                      })}
                    </div>
                  </div>

                  {/* 스택 시각화 */}
                  <div className="flex-1 flex flex-col items-center justify-end">
                    <div className="w-24 border-l-4 border-r-4 border-b-4 border-slate-300 rounded-b-lg bg-slate-50 min-h-[160px] flex flex-col-reverse p-2 space-y-reverse space-y-1">
                      {stepData.stack.length === 0 && (
                        <div className="text-slate-400 text-xs italic text-center py-6">비어있음</div>
                      )}
                      {stepData.stack.map((val, idx) => {
                        const isTop = idx === stepData.stack.length - 1;
                        return (
                          <div
                            key={idx}
                            className={`w-full h-10 flex items-center justify-center rounded font-bold text-2xl ${
                              isTop
                                ? 'bg-blue-500 text-white shadow-lg'
                                : 'bg-blue-200 text-blue-900'
                            }`}
                            style={{ transition: 'all 0.3s' }}
                          >
                            {val}
                          </div>
                        );
                      })}
                    </div>
                    <div className="text-xs text-slate-500 mt-2 font-mono">stack</div>
                  </div>

                  {/* 결과 */}
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mt-4 space-y-2">
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-600">스택 크기</span>
                      <span className="font-bold text-slate-800">{stepData.stack.length}</span>
                    </div>
                    <div className={`flex justify-between items-center p-3 rounded-md shadow-sm ${
                      stepData.result === 'yes' ? 'bg-emerald-600 text-white' :
                      stepData.result === 'no' ? 'bg-red-600 text-white' :
                      'bg-slate-800 text-white'
                    }`}>
                      <span className="font-semibold text-sm">결과</span>
                      <span className="text-2xl font-bold">
                        {stepData.result ? stepData.result : '검사중...'}
                      </span>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 일시정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 재생</>
                      )}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">
                    진행도: {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          data-active={isActive ? 'true' : 'false'}
                          className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}
                        >
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
