<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그리디: 신입 사원 - 백준 1946</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "import sys",
      "",
      "arr = []",
      "for _ in range(N):",
      "    a, b = map(int, sys.stdin.readline().split())",
      "    arr.append([a, b])",
      "",
      "# 서류 순위 기준 오름차순 정렬",
      "arr.sort()",
      "",
      "cnt = 1  # 서류 1등은 무조건 합격",
      "standard = arr[0][1]  # 면접 기준값",
      "",
      "for i in range(1, len(arr)):",
      "    # 면접 순위가 기준보다 높으면(작으면) 합격",
      "    if arr[i][1] < standard:",
      "        cnt += 1",
      "        standard = arr[i][1]",
      "",
      "print(cnt)"
    ];

    const INITIAL_DATA = [[3, 2], [1, 4], [4, 1], [2, 3], [5, 5]];

    const generateSimulationSteps = (data) => {
      const steps = [];
      const arr = data.map(d => [...d]);
      const N = arr.length;

      steps.push({
        codeLine: 2,
        desc: `${N}명의 지원자 데이터: 서류순위, 면접순위 쌍을 입력받았습니다.`,
        people: arr.map((p, i) => ({ doc: p[0], interview: p[1], state: 'unsorted', idx: i })),
        cnt: 0,
        standard: null,
        currentI: null
      });

      arr.sort((a, b) => a[0] - b[0]);
      steps.push({
        codeLine: 8,
        desc: `서류 순위 기준 오름차순 정렬. 서류 1등부터 순서대로 면접 순위를 확인합니다.`,
        people: arr.map((p, i) => ({ doc: p[0], interview: p[1], state: 'sorted', idx: i })),
        cnt: 0,
        standard: null,
        currentI: null
      });

      let cnt = 1;
      let standard = arr[0][1];
      steps.push({
        codeLine: 10,
        desc: `서류 1등(면접 ${arr[0][1]}등)은 무조건 합격. 면접 기준값 = ${standard}`,
        people: arr.map((p, i) => ({ doc: p[0], interview: p[1], state: i === 0 ? 'accepted' : 'sorted', idx: i })),
        cnt: cnt,
        standard: standard,
        currentI: 0
      });

      for (let i = 1; i < N; i++) {
        steps.push({
          codeLine: 13,
          desc: `서류 ${arr[i][0]}등, 면접 ${arr[i][1]}등을 확인합니다. 면접 기준값(${standard})보다 높은가?`,
          people: arr.map((p, j) => ({
            doc: p[0], interview: p[1],
            state: j < i ? (steps[steps.length-1].people[j].state) : j === i ? 'checking' : 'sorted',
            idx: j
          })),
          cnt: cnt,
          standard: standard,
          currentI: i
        });

        if (arr[i][1] < standard) {
          cnt++;
          standard = arr[i][1];
          steps.push({
            codeLine: 15,
            desc: `면접 ${arr[i][1]}등 < 기준 ${steps[steps.length-1].standard}. 합격! 새 기준값 = ${standard}, 합격자 = ${cnt}명`,
            people: arr.map((p, j) => ({
              doc: p[0], interview: p[1],
              state: j <= i ? (j === i ? 'accepted' : steps[steps.length-1].people[j].state === 'checking' ? 'accepted' : steps[steps.length-1].people[j].state) : 'sorted',
              idx: j
            })),
            cnt: cnt,
            standard: standard,
            currentI: i
          });
        } else {
          steps.push({
            codeLine: 13,
            desc: `면접 ${arr[i][1]}등 >= 기준 ${standard}. 불합격. (서류, 면접 모두 뒤처짐)`,
            people: arr.map((p, j) => ({
              doc: p[0], interview: p[1],
              state: j < i ? steps[steps.length-1].people[j].state : j === i ? 'rejected' : 'sorted',
              idx: j
            })),
            cnt: cnt,
            standard: standard,
            currentI: i
          });
        }
      }

      steps.push({
        codeLine: 19,
        desc: `모든 지원자 확인 완료. 최대 채용 인원 = ${cnt}명`,
        people: steps[steps.length - 1].people,
        cnt: cnt,
        standard: standard,
        currentI: null
      });

      return steps;
    };

    const STEPS = generateSimulationSteps(INITIAL_DATA);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      if (!codePart.trim() && commentPart) return <span className="text-slate-500 italic">{commentPart}</span>;
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\.)/g);
      const keywords = new Set(['import', 'for', 'in', 'if']);
      const builtins = new Set(['int', 'input', 'range', 'len', 'map', 'print']);
      const methods = new Set(['readline', 'split', 'sort', 'append']);
      const modules = new Set(['sys']);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (builtins.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (methods.has(token)) return <span key={i} className="text-yellow-200">{token}</span>;
        if (modules.has(token)) return <span key={i} className="text-green-300">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!='].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(prev => prev + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1500);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current && stepData.codeLine !== null) {
          const activeEl = codeViewerRef.current.querySelector('[data-active="true"]');
          if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, [currentStepIdx]);

      const maxRank = Math.max(...stepData.people.map(p => p.interview));

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">그리디: 신입 사원 시각화</h1>
              <p className="text-slate-600">
                각 지원자는 서류 순위와 면접 순위를 가집니다. 채용하려면 <b>다른 모든 지원자와 비교했을 때,
                서류와 면접 중 적어도 하나는 더 높아야</b> 합니다. 서류 순위로 정렬 후,
                면접 순위의 최솟값(기준)을 갱신하며 스캔하면 O(N)으로 해결됩니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700 flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg font-semibold text-slate-800">지원자 현황 (면접 순위 막대)</h2>
                    <div className="flex space-x-3 text-xs text-slate-500">
                      <div className="flex items-center"><span className="w-3 h-3 bg-emerald-500 rounded-sm mr-1"></span> 합격</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-red-400 rounded-sm mr-1"></span> 불합격</div>
                      <div className="flex items-center"><span className="w-3 h-3 bg-orange-400 rounded-sm mr-1"></span> 확인중</div>
                    </div>
                  </div>

                  <div className="flex items-end justify-center h-48 border-b-2 border-slate-300 pb-1 mb-4 space-x-3">
                    {stepData.people.map((p, idx) => {
                      const heightPct = Math.max(15, (p.interview / maxRank) * 100);
                      let barClass = "w-14 rounded-t-md flex flex-col justify-end items-center text-xs font-bold pb-1 ";
                      if (p.state === 'accepted') barClass += "bg-emerald-500 text-white border-b-4 border-emerald-700";
                      else if (p.state === 'rejected') barClass += "bg-red-400 text-white border-b-4 border-red-600 opacity-60";
                      else if (p.state === 'checking') barClass += "bg-orange-400 text-white shadow-lg scale-105 border-b-4 border-orange-600";
                      else barClass += "bg-slate-200 text-slate-500";

                      return (
                        <div key={idx} className="flex flex-col items-center">
                          <div className="text-xs text-slate-400 mb-1">면접{p.interview}등</div>
                          <div className={barClass} style={{ height: `${heightPct}%`, transition: 'all 0.3s' }}>
                            {p.interview}
                          </div>
                          <div className="text-xs text-slate-500 mt-1 font-mono">서류{p.doc}등</div>
                        </div>
                      );
                    })}
                  </div>

                  {/* 기준선 표시 */}
                  {stepData.standard !== null && (
                    <div className="text-sm text-center text-orange-600 font-semibold mb-2">
                      면접 기준선: {stepData.standard}등 (이보다 높아야 합격)
                    </div>
                  )}

                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 space-y-2">
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-600">면접 기준값 <code className="bg-slate-200 px-1 rounded">standard</code></span>
                      <span className="font-bold text-orange-600">{stepData.standard !== null ? stepData.standard : '-'}</span>
                    </div>
                    <div className="flex justify-between items-center bg-slate-800 text-white p-3 rounded-md shadow-sm">
                      <span className="font-semibold text-sm">합격자 수 <code className="bg-slate-700 px-1 text-xs rounded">cnt</code></span>
                      <span className="text-2xl font-bold text-emerald-400">{stepData.cnt}</span>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 일시정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 재생</>
                      )}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto overflow-x-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'}
                          className={`px-2 py-0.5 rounded whitespace-nowrap ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
