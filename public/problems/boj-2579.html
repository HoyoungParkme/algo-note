<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DP: 계단 오르기 - 백준 2579</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PYTHON_CODE = [
      "N = int(input())",
      "S = [0] * N",
      "for i in range(N):",
      "     S[i] = int(input())",
      "",
      "A = [0] * N",
      "B = [0] * N",
      "",
      "A[0] = S[0]",
      "B[0] = S[0]",
      "",
      "for i in range(1,N):",
      "    if i >= 2:",
      "        A[i] = S[i] + max(A[i-2], B[i-2])",
      "    else:",
      "        A[i] = S[i]",
      "",
      "    if i >= 3:",
      "        B[i] = S[i] + S[i - 1] + max(A[i-3], B[i-3])",
      "    else:",
      "        B[i] = S[i] + S[i-1]",
      "",
      "print(max(A[N-1],B[N-1]))"
    ];

    const generateSimulationSteps = () => {
      const steps = [];
      const N = 6;
      const scores = [0, 10, 20, 15, 25, 10, 20];
      const dp = new Array(N + 1).fill(0);

      steps.push({
        codeLine: 8,
        desc: `N=${N}. 계단 점수는 [${scores.slice(1).join(', ')}] 입니다. dp 배열을 초기화합니다.`,
        dp: [...dp],
        scores,
        currentI: null,
      });

      dp[1] = scores[1];
      steps.push({
        codeLine: 8,
        desc: `첫 번째 계단을 밟는 최대 점수: dp[1] = scores[1] = ${scores[1]}`,
        dp: [...dp],
        scores,
        currentI: 1,
      });

      dp[2] = scores[1] + scores[2];
      steps.push({
        codeLine: 11,
        desc: `두 번째 계단을 밟는 최대 점수: 두 계단을 연속해서 밟는 것이 점수가 가장 높습니다. dp[2] = ${scores[1]} + ${scores[2]} = ${dp[2]}`,
        dp: [...dp],
        scores,
        currentI: 2,
      });

      dp[3] = Math.max(scores[1] + scores[3], scores[2] + scores[3]);
      steps.push({
        codeLine: 11,
        desc: `세 번째 계단을 밟는 최대 점수: 시작점->1->3 계단 밟기 vs 시작점->2->3 계단 밟기 (연속 3계단 불가)`,
        dp: [...dp],
        scores,
        currentI: 3,
        checking: [1, 2]
      });

      for (let i = 4; i <= N; i++) {
        steps.push({
          codeLine: 11,
          desc: `현재 계속 i = ${i}에 대해 최댓값을 계산합니다. 연속된 3개의 계단을 밟을 수 없습니다.`,
          dp: [...dp],
          scores,
          currentI: i,
        });

        const case1 = dp[i - 3] + scores[i - 1] + scores[i];
        const case2 = dp[i - 2] + scores[i];

        dp[i] = Math.max(case1, case2);
        
        steps.push({
          codeLine: 11,
          desc: `마지막 위치 i=${i} 도달법 2가지 비교:
          (1) i-3을 밟고 i-1을 거쳐 i로 온 경우 (${dp[i-3]}+${scores[i-1]}+${scores[i]} = ${case1})
          (2) i-2를 밟고 바로 i로 온 경우 (${dp[i-2]}+${scores[i]} = ${case2})
          더 큰 값 ${dp[i]}를 저장!`,
          dp: [...dp],
          scores,
          currentI: i,
          checking: [i-3, i-2]
        });
      }

      steps.push({
        codeLine: 23,
        desc: `계산 완료! 꼭대기 계단에 도달할 수 있는 최대 점수는 ${dp[N]}점 입니다.`,
        dp: [...dp],
        scores,
        currentI: N,
      });

      return steps;
    };

    const STEPS = generateSimulationSteps();

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line, commentPart = '';
      if (commentIdx !== -1) { codePart = line.slice(0, commentIdx); commentPart = line.slice(commentIdx); }
      const keywords = new Set(['for', 'in', 'if', 'max']);
      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*)/g);
      const highlightedTokens = tokens.map((token, i) => {
        if (keywords.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (!isNaN(token) && token.trim() !== '') return <span key={i} className="text-orange-300">{token}</span>;
        if (['=', '+', '-', '<', '>', '==', '!=', '*'].includes(token)) return <span key={i} className="text-pink-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });
      return <>{highlightedTokens}{commentPart && <span className="text-slate-500 italic">{commentPart}</span>}</>;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const codeViewerRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = useCallback(() => {
        if (currentStepIdx < STEPS.length - 1) setCurrentStepIdx(p => p + 1);
        else setIsPlaying(false);
      }, [currentStepIdx]);

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const handleReset = () => { setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) handleReset(); setIsPlaying(!isPlaying); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(handleNext, 1500);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying, handleNext]);

      useEffect(() => {
        if (codeViewerRef.current) {
          const el = codeViewerRef.current.querySelector('[data-active="true"]');
          // removed scroll
        }
      }, [currentStepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-2xl font-bold text-slate-800 mb-2">DP: 계단 오르기 시각화</h1>
              <p className="text-slate-600">
                연속된 세 개의 계단을 밟지 않고 꼭대기에 도달할 때, 얻을 수 있는 최대 점수를 동적 계획법으로 해결합니다.
              </p>
            </header>

            <div className="bg-blue-600 text-white p-5 rounded-xl shadow-sm border border-blue-700">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계 동작</h3>
              <p className="text-lg font-medium leading-relaxed" style={{ whiteSpace: 'pre-line' }}>{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 relative">
                  <h2 className="text-lg font-semibold text-slate-800 mb-6 font-mono text-center">점수와 단계(DP)</h2>
                  <div className="relative" style={{ height: '300px' }}>
                    {stepData.scores.map((score, idx) => {
                      if (idx === 0) return null;
                      
                      const isCurrent = stepData.currentI === idx;
                      const isChecking = stepData.checking && stepData.checking.includes(idx);
                      const isCalculated = stepData.dp[idx] > 0;
                      
                      // 계단 계단 모양으로 표시
                      const width = 100 / stepData.scores.length;
                      const left = `${width * idx}%`;
                      const bottom = `${(idx - 1) * 15}%`;

                      let baseColor = "bg-slate-200 border-slate-300 text-slate-700";
                      if (isCurrent) baseColor = "bg-blue-500 border-blue-600 text-white font-bold scale-110 z-10 shadow-lg";
                      else if (isChecking) baseColor = "bg-orange-400 border-orange-500 text-white font-bold scale-105 z-10";
                      else if (isCalculated) baseColor = "bg-emerald-400 border-emerald-500 text-white shadow shadow-emerald-200/50";
                      
                      return (
                        <div 
                          key={idx} 
                          className={`absolute w-[12%] flex flex-col items-center justify-end rounded-t-lg transition-all duration-300 ${baseColor} border-t-4 border-l-4 border-r-4`}
                          style={{ left, bottom, height: '40px' }}
                        >
                          <div className="absolute -top-6 text-xs text-slate-500 font-bold">idx: {idx}</div>
                          <div className="text-[0.7rem] opacity-70 mb-0">+{score}</div>
                          <div className="text-[0.8rem] -mt-1 font-mono tracking-tighter">dp:{stepData.dp[idx]}</div>
                        </div>
                      )
                    })}
                  </div>
                  
                  <div className="mt-8 flex flex-wrap gap-4 text-sm text-slate-600 border-t border-slate-100 pt-4">
                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded bg-blue-500"></div>현재 계산 위치</div>
                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded bg-orange-400"></div>참조 계산 위치</div>
                    <div className="flex items-center gap-2"><div className="w-4 h-4 rounded bg-emerald-400"></div>계산 완료됨</div>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium shadow-sm cursor-pointer">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>일시정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 재생</>)}</button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 cursor-pointer disabled:cursor-default"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button onClick={handleReset} className="p-2 rounded text-slate-500 hover:text-slate-800 hover:bg-slate-100 ml-2 cursor-pointer" title="초기화"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                  </div>
                  <div className="text-sm font-medium text-slate-500">진행도: {currentStepIdx + 1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative rounded-xl shadow-sm border border-slate-800 overflow-hidden" style={{ minHeight: '500px' }}>
                <div className="absolute inset-0 bg-slate-900 flex flex-col">
                  <div ref={codeViewerRef} className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300" style={{ scrollBehavior: 'smooth' }}>
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div key={idx} data-active={isActive ? 'true' : 'false'} className={`px-2 py-0.5 rounded gap-2 ${isActive ? 'bg-blue-900/40 text-white font-bold border-l-2 border-blue-400 shadow-inner' : 'border-l-2 border-transparent'}`}>
                          <span style={{ whiteSpace: 'pre' }}>{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
