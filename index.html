<!DOCTYPE html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="알고리즘 스터디 노트 — 코딩 테스트 대비 개념 정리, 코드 템플릿, 퀴즈, 진행률 관리" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <title>Algorithm Study Note</title>
    <script>
      // 다크 모드 깜빡임 방지 (FOUC 회피)
      try {
        const stored = localStorage.getItem('algo-note-store');
        const theme = stored ? JSON.parse(stored)?.state?.theme : 'dark';
        document.documentElement.classList.toggle('dark', theme !== 'light');
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
